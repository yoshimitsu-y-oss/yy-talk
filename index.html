<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>YY-Talk - PRO Cloud Matrix</title>
  
  <script>
    window.onerror = function(message, source, lineno) {
      alert("【システムエラー検知】\n裏側で処理が停止しました。\n" + message + "\n行: " + lineno);
    };
  </script>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  
  <style>
    :root {
      --bg-dark: #0a0b0d; --card-bg: #1c1d21; --card-bg-expanded: #24262b;
      --text-main: #ffffff; --text-sub: #7a7e85;
      --green: #4ade80; --red: #dc2626;
      --orange: #f97316; --blue: #3b82f6;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0; padding: 0; 
      background-color: #121418; 
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden;
    }

    .app-container {
      width: 100%; height: 100dvh;
      background-color: var(--bg-dark);
      display: flex; flex-direction: column;
      position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .app-container {
        width: 96vw; max-width: 1800px; 
        height: 94vh; max-height: 1200px; min-height: 600px;
        border-radius: 20px; border: 8px solid #1e2128; overflow: hidden;
      }
    }

    /* --- オーバーレイ (裏画面) --- */
    .overlay-base {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none;
      align-items: center; justify-content: center; flex-direction: column;
      backdrop-filter: blur(4px); z-index: 1000;
      overflow-y: auto; 
    }
    
    @media (max-height: 700px) {
      .overlay-base { align-items: flex-start; padding: 20px 0; }
    }

    #login-overlay { z-index: 2000; }
    #audio-overlay { z-index: 1100; }
    
    .btn-green-solid {
      background: var(--green); color: #000; border: none; padding: 15px 30px;
      font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
    }

    .login-modal {
      background: var(--card-bg); padding: 25px 20px; border-radius: 12px; width: 90%; max-width: 340px;
      border: 1px solid #3a3c42; position: relative; display: flex; flex-direction: column; gap: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin: auto; 
    }
    
    .login-modal .btn-close-login {
      position: absolute; top: 12px; right: 15px; background: transparent; border: none; 
      color: #9ca3af; font-size: 28px; cursor: pointer; padding: 0; 
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      line-height: 1; z-index: 2010; font-weight: normal;
    }
    .login-modal .btn-close-login:hover { color: #ffffff; }

    .login-modal input { width: 100%; padding: 12px; background: #0a0b0d; border: 1px solid #3a3c42; color: #fff; border-radius: 8px; font-size: 16px; text-align: center;}
    
    .login-modal button:not(.btn-close-login) { 
      padding: 14px; border: none; border-radius: 8px; font-weight: bold; 
      color: #000; cursor: pointer; font-size: 15px; transition: opacity 0.2s; 
      position: relative; z-index: 2001;
    }
    .login-modal button:not(.btn-close-login):disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-join-member { background: var(--orange); width: 100%; } 
    .btn-join-admin { background: transparent; border: 1.5px solid var(--blue) !important; color: var(--blue) !important; width: 100%; } 
    .btn-stop { background: var(--red); width: 100%; }
    .status-text { font-size: 12px; color: var(--text-sub); text-align: center; margin-top: 5px;}

    /* --- 管理画面 (マトリックスUI対応) --- */
    .admin-modal { max-width: 95%; width: auto; min-width: 320px; }
    @media (min-width: 800px) { .admin-modal { max-width: 1200px; } }
    
    .scroll-area { 
      max-height: 75vh; overflow: auto; padding-right: 5px; 
      -ms-overflow-style: none; scrollbar-width: none; 
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    .admin-matrix-wrapper {
      width: 100%; overflow-x: auto;
      border: 1px solid #3a3c42; border-radius: 8px; background: #0a0b0d;
    }
    .admin-matrix {
      width: 100%; border-collapse: collapse; min-width: max-content;
      text-align: center; font-size: 13px;
    }
    .admin-matrix th, .admin-matrix td {
      border: 1px solid #3a3c42; padding: 10px;
    }
    .admin-matrix th {
      background-color: #1c1d21; color: var(--text-sub); font-weight: normal; position: sticky; top: 0; z-index: 5;
    }
    
    .diagonal-header {
      position: relative; min-width: 260px; min-height: 50px;
      background: linear-gradient(to top right, #1c1d21 49.2%, #3a3c42 49.2%, #3a3c42 50.8%, #1c1d21 50.8%);
    }
    .diagonal-header .dh-member { position: absolute; top: 8px; right: 15px; font-weight: bold; color: var(--text-main); }
    .diagonal-header .dh-party { position: absolute; bottom: 8px; left: 15px; font-weight: bold; color: var(--text-main); }

    .admin-matrix td.ch-cell {
      text-align: left; background-color: #0a0b0d; min-width: 260px; padding: 10px;
    }
    
    .matrix-toggle {
      width: 26px; height: 26px; border-radius: 50%; margin: 0 auto;
      background: #1c1d21; border: 2px solid #3a3c42;
      cursor: pointer; transition: 0.1s ease-in-out; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .matrix-toggle.active {
      background: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
    }
    
    .btn-delete-col, .btn-delete-row {
      background: var(--red); color: #fff; border: none; 
      border-radius: 4px; cursor: pointer; padding: 5px 8px; font-size: 11px;
      transition: all 0.2s; font-weight: bold; box-shadow: 0 0 6px rgba(220, 38, 38, 0.5);
    }
    .btn-delete-col:hover, .btn-delete-row:hover {
      box-shadow: 0 0 10px rgba(220, 38, 38, 0.8); filter: brightness(1.1);
    }

    /* --- ヘッダー --- */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(env(safe-area-inset-top) + 12px) 15px 12px;
      background: var(--bg-dark); border-bottom: 2px solid var(--green);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; color: var(--blue); font-weight: bold; font-size: 18px; }
    .header-right { display: flex; align-items: center; gap: 12px; color: var(--text-sub); font-size: 13px; font-weight: bold; }
    
    .btn-login-trigger {
      background: transparent; border: 1.5px solid var(--text-sub); color: var(--text-sub);
      padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px;
      transition: 0.2s;
    }
    .btn-login-trigger:active { background: var(--text-sub); color: var(--bg-dark); }
    .btn-login-trigger.online { border-color: var(--blue); color: var(--blue); }
    .btn-admin-trigger { border-color: var(--green); color: var(--green); display: none; }

    /* --- チャンネルリスト --- */
    .channel-list-container {
      flex: 1; overflow-y: auto; padding: 10px 10px 20px; 
      display: flex; flex-direction: column; gap: 10px; 
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .channel-list-container::-webkit-scrollbar { display: none; }

    #channel-list-wrap { 
      display: grid; grid-template-columns: 1fr; gap: 10px; 
    }
    @media (min-width: 600px) {
      #channel-list-wrap { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
    }

    .channel-card {
      background-color: var(--card-bg);
      border-radius: 10px; position: relative;
      overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s ease;
    }
    .channel-card.expanded { background-color: var(--card-bg-expanded); }
    
    .channel-card::before, .channel-card::after {
      content: ""; position: absolute; top: 0; bottom: 0; width: 50%; opacity: 0; 
      transition: opacity 0.3s ease; pointer-events: none; z-index: 0;
    }
    .channel-card::before { left: 0; background: linear-gradient(to right, rgba(74, 222, 128, 0.25) 0%, transparent 100%); }
    .channel-card::after { right: 0; background: linear-gradient(to left, rgba(248, 113, 113, 0.25) 0%, transparent 100%); }
    
    .channel-card.listen-on::before { opacity: 1; }
    .channel-card.talk-on::after { opacity: 1; }
    
    .channel-card > * { position: relative; z-index: 1; }

    .status-line-bg {
      position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px;
      background-color: #0a0b0d; border-radius: 0 4px 4px 0; overflow: hidden; z-index: 2;
    }
    .status-line-fill {
      position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
      transition: height 0.1s;
      background: linear-gradient(to top, #4ade80 0%, #4ade80 40%, #eab308 75%, #f87171 100%);
    }

    .volume-panel { display: none; padding: 10px 20px 5px; align-items: center; gap: 15px; }
    .channel-card.expanded .volume-panel { display: flex; }
    .vol-icon { width: 14px; height: 14px; fill: var(--text-sub); flex-shrink: 0; }
    
    .vol-slider-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    .vol-slider-track-bg { position: absolute; left: 0; right: 0; height: 4px; background: #3a3c42; border-radius: 2px; z-index: 1; }
    .vol-slider-fill { position: absolute; left: 0; height: 4px; background: var(--orange); border-radius: 2px; z-index: 2; width: 50%; pointer-events: none; }
    
    input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; height: 24px; position: relative; z-index: 3; margin: 0; outline: none; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 24px; background: transparent; border: none; }
    input[type=range]::-webkit-slider-thumb { 
      -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; 
      background: #ffffff; box-shadow: 0 0 8px rgba(0,0,0,0.6); cursor: pointer; margin-top: 3px; 
    }

    .main-controls { display: flex; align-items: center; justify-content: space-between; padding: 15px; position: relative; }
    .ch-info { text-align: center; flex: 1; padding: 0 10px; }
    
    .ch-name { font-size: 16px; font-weight: 500; margin-bottom: 2px; display: inline-block; padding: 2px 6px; border-radius: 4px; }
    .ch-type { font-size: 10px; color: var(--text-sub); display: inline-block; padding: 2px 6px; border-radius: 4px; pointer-events: auto; }

    /* 上質なボタンデザイン */
    .btn-action {
      width: 56px; height: 56px; border-radius: 50%; border: 2px solid;
      display: flex; align-items: center; justify-content: center; background: #1c1d21;
      touch-action: none; z-index: 10; user-select: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.05);
      transition: background-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .btn-icon { width: 26px; height: 26px; fill: currentColor; pointer-events: none; }
    
    .btn-listen { border-color: var(--green); color: var(--green); }
    .btn-listen.active, .btn-listen.latched { 
      background-color: var(--green); color: var(--bg-dark); 
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 4px 15px rgba(74, 222, 128, 0.5);
    }
    
    .btn-talk { border-color: var(--red); color: var(--red); }
    .btn-talk.active, .btn-talk.latched { 
      background-color: var(--red); color: var(--text-main); 
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 4px 15px rgba(220, 38, 38, 0.5);
    }

    .ch-meter-container { height: 4px; background: #0a0b0d; margin: 0 45px 0; border-radius: 2px; overflow: hidden; position: relative; opacity: 0.8; }
    .ch-meter-fill { height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, #4ade80 0%, #4ade80 60%, #eab308 80%, #f87171 100%); }
    .btn-expand { text-align: center; padding: 6px 0 8px; color: var(--text-sub); font-size: 16px; letter-spacing: 2px; cursor: pointer; }

    .master-meter-container { height: 8px; width: 100%; background: #1c1d21; position: relative; flex-shrink: 0; }
    .master-meter-fill { height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, #4ade80 0%, #4ade80 60%, #eab308 80%, #f87171 100%); }

    /* --- スマホ横向き (ランドスケープ) 対応 --- */
    @media (orientation: landscape) and (max-height: 600px) {
      .app-container { height: 100dvh; max-height: none; border-radius: 0; border: none; }
      .header { padding: 4px 15px; }
      .channel-list-container { padding: 5px 10px; gap: 5px; }
      .main-controls { padding: 5px 10px; }
      .btn-action { width: 44px; height: 44px; }
      .btn-icon { width: 20px; height: 20px; }
      .ch-name { font-size: 14px; margin-bottom: 0; }
      .btn-expand { padding: 2px 0; font-size: 12px; }
      
      .login-modal { max-height: 95vh; overflow-y: auto; padding: 15px; }
      .admin-modal { max-width: 100%; }
      .scroll-area { max-height: calc(95vh - 80px); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div id="audio-overlay" class="overlay-base">
      <p style="font-weight:bold; margin-bottom:20px; font-size: 18px;">通話に参加しますか？</p>
      <button id="btn-enable-audio" class="btn-green-solid">音声を有効にして参加</button>
    </div>

    <div id="login-overlay" class="overlay-base" style="display: flex;">
      <div class="login-modal">
        <button class="btn-close-login" id="btn-close-login">×</button>
        <h3 style="margin: 0 0 5px 0; text-align: center; color: var(--text-main);">Network Login</h3>
        
        <input id="host-id" type="text" value="yytalk" placeholder="ルーム名 (英数字)">
        <input id="join-userid" type="text" placeholder="ユーザーID (例: Cam1)">
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn-join-member" id="btn-join-member" onclick="joinNetwork(false)">メンバーとして参加</button>
          <button class="btn-join-admin" id="btn-join-admin" onclick="joinNetwork(true)">管理者として参加</button>
        </div>
        
        <button class="btn-stop" id="btn-stop">Disconnect</button>
        
        <div class="status-text" id="status-msg">待機中... ルーム名を入力して接続</div>
        <div class="status-text" style="color: var(--blue);">My ID: <span id="status-my-id">-</span></div>
      </div>
    </div>

    <div id="admin-overlay" class="overlay-base">
      <div class="login-modal admin-modal">
        <button class="btn-close-login" id="btn-close-admin">×</button>
        <h3 style="margin: 0 0 15px 0; text-align: center; color: var(--text-main);">パッチパネル</h3>
        
        <div class="scroll-area">
          <div id="admin-matrix-container"></div>
          <button id="btn-add-ch" style="background:transparent; border:1px solid var(--green); color:var(--green); width:100%; padding:10px; margin-top:15px; border-radius:8px; cursor:pointer; font-weight:bold; transition: background 0.2s;">＋ 新規パーティーを追加</button>
        </div>
      </div>
    </div>

    <audio id="dummy-audio" loop playsinline src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3"></audio>

    <div class="header">
      <div class="header-left" id="app-title">YY-Talk</div>
      <div class="header-right">
        <button id="btn-admin" class="btn-login-trigger btn-admin-trigger">管理</button>
        <span id="status-role" style="color: var(--orange);">Offline</span>
        <button id="btn-show-login" class="btn-login-trigger">Login</button>
      </div>
    </div>

    <div class="channel-list-container">
      <div id="channel-list-wrap"></div>
    </div>

    <div class="master-meter-container">
      <div class="master-meter-fill" id="master-meter-fill"></div>
    </div>

  </div>

  <script>
    // --- クラウドストレージ アダプター (KVDB.io を利用した無料オープンAPI) ---
    // ※実稼働時はFirebaseなどに差し替えてください
    const CloudStore = {
      baseUrl: 'https://kvdb.io/bucket/yytalk-pro-cloud/room_',
      async save(roomId, data) {
        try {
          await fetch(this.baseUrl + roomId, {
            method: 'POST',
            body: JSON.stringify(data)
          });
        } catch(e) { console.warn("Cloud save failed", e); }
      },
      async load(roomId) {
        try {
          const res = await fetch(this.baseUrl + roomId);
          if (res.ok) {
            const text = await res.text();
            return text ? JSON.parse(text) : null;
          }
        } catch(e) { console.warn("Cloud load failed", e); }
        return null;
      }
    };

    const state = {
      peer: null, localStream: null,
      mySlot: 0,
      peers: new Set(),
      users: {},             
      registeredUsers: [],   
      userAssignments: {},   
      dataConns: {},    
      mediaCalls: {},   
      talkStates: {},         
      listenStates: {},       
      channelVolumes: {},     
      remoteTalkStates: {},   
      channelNodes: {},       
      isAdmin: false,
      audioEnabled: false
    };

    let channels = [
      { id: 'ch1', name: 'ch1', type: 'PL' },
      { id: 'ch2', name: 'ch2', type: 'PL' },
      { id: 'ch3', name: 'ch3', type: 'PL' },
      { id: 'ch4', name: 'ch4', type: 'PL' },
      { id: 'ch5', name: 'ch5', type: 'PL' }
    ];

    const els = {
      statusMsg: document.getElementById('status-msg'),
      hostIdInput: document.getElementById('host-id'),
      joinUserIdInput: document.getElementById('join-userid'),
      myIdDisplay: document.getElementById('status-my-id'),
      roleDisplay: document.getElementById('status-role'),
      dummyAudio: document.getElementById('dummy-audio'),
      audioOverlay: document.getElementById('audio-overlay'),
      loginOverlay: document.getElementById('login-overlay'),
      btnLoginShow: document.getElementById('btn-show-login'),
      masterMeterFill: document.getElementById('master-meter-fill'),
      appTitle: document.getElementById('app-title'),
      
      adminOverlay: document.getElementById('admin-overlay'),
      btnAdmin: document.getElementById('btn-admin'),
      btnCloseAdmin: document.getElementById('btn-close-admin'),
      btnAddCh: document.getElementById('btn-add-ch'),

      chWrap: document.getElementById('channel-list-wrap'),
      btnJoinMember: document.getElementById('btn-join-member'),
      btnJoinAdmin: document.getElementById('btn-join-admin')
    };

    els.btnLoginShow.onclick = () => { els.loginOverlay.style.display = 'flex'; };
    document.getElementById('btn-close-login').onclick = () => { els.loginOverlay.style.display = 'none'; };
    
    els.btnAdmin.onclick = () => { 
      if (!state.isAdmin) return;
      updateAdminMatrix(); // パッチパネルを開く時だけ全体描画
      els.adminOverlay.style.display = 'flex'; 
    };
    els.btnCloseAdmin.onclick = () => { els.adminOverlay.style.display = 'none'; };

    const iconSpeaker = `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`;
    const iconMic = `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>`;

    // --- クラウドへの保存 (デバウンス処理付きで負荷軽減) ---
    let cloudSaveTimer = null;
    function saveRoomState() {
      const roomId = els.hostIdInput.value || 'yytalk';
      const dataToSave = { 
        channels, 
        userAssignments: state.userAssignments,
        registeredUsers: state.registeredUsers
      };
      // ローカルバックアップも念のため残す
      try { localStorage.setItem('yytalk_room_' + roomId, JSON.stringify(dataToSave)); } catch(e){}
      
      // 連続タップ時は通信せず、1秒操作が止まったらクラウドへ送る
      clearTimeout(cloudSaveTimer);
      cloudSaveTimer = setTimeout(() => {
         CloudStore.save(roomId, dataToSave);
      }, 1000);
    }

    async function loadRoomStateCloud(roomId) {
      els.statusMsg.textContent = "クラウドから設定を取得中...";
      const data = await CloudStore.load(roomId);
      if (data && data.channels) {
         resetAndApplyChannels(data.channels, data.userAssignments, data.registeredUsers);
      } else {
         // クラウドに無い場合はローカルキャッシュを探す
         const local = localStorage.getItem('yytalk_room_' + roomId);
         if(local) {
             try {
                 const parsed = JSON.parse(local);
                 if(parsed.channels) resetAndApplyChannels(parsed.channels, parsed.userAssignments, parsed.registeredUsers);
             } catch(e){}
         }
      }
    }

    function resetAndApplyChannels(newChannels, newAssignments, newRegistered) {
        if (audioCtx) {
           Object.values(state.channelNodes).forEach(node => { try { node.masterGain.disconnect(); } catch(e){} });
           Object.values(state.mediaCalls).forEach(call => {
               Object.values(call.chGains || {}).forEach(g => { try { g.disconnect(); } catch(e){} });
               call.chGains = {};
           });
        }
        state.channelNodes = {};
        channels = newChannels;
        
        if (newAssignments) state.userAssignments = newAssignments;
        if (newRegistered) {
           state.registeredUsers = newRegistered;
        } else {
           state.registeredUsers = Object.keys(state.userAssignments || {});
        }
        
        initChannelsDOM();
        if (audioCtx) {
           channels.forEach(ch => setupChannelAudio(ch.id));
           Object.values(state.mediaCalls).forEach(call => {
              if (call.source) {
                  channels.forEach(ch => {
                      const splitGain = audioCtx.createGain();
                      splitGain.gain.value = 0;
                      call.source.connect(splitGain);
                      if(state.channelNodes[ch.id]) splitGain.connect(state.channelNodes[ch.id].analyser);
                      call.chGains[ch.id] = splitGain;
                  });
              }
           });
        }
        
        if (state.userAssignments && els.joinUserIdInput.value) {
           const myUid = els.joinUserIdInput.value;
           applyAssignments(state.userAssignments[myUid] || channels.map(c=>c.id));
        } else {
           applyAssignments(channels.map(c=>c.id)); 
        }
        updateAudioRouting();
    }

    function createChannelCard(ch) {
      if(state.listenStates[ch.id] === undefined) state.listenStates[ch.id] = false;
      if(state.talkStates[ch.id] === undefined) state.talkStates[ch.id] = false;
      if(state.channelVolumes[ch.id] === undefined) state.channelVolumes[ch.id] = 1.5;

      const listenClass = state.listenStates[ch.id] ? 'listen-on' : '';
      const talkClass = state.talkStates[ch.id] ? 'talk-on' : '';

        <div class="volume-panel">

          <div class="vol-slider-wrap">
            <div class="vol-slider-track-bg"></div>
            <div class="vol-slider-fill" id="fill-${ch.id}"></div>
            <input type="range" id="vol-${ch.id}" min="0" max="100" value="50">
          </div>
          <svg class="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>
        <div class="main-controls">
          <div class="btn-action btn-listen ${state.listenStates[ch.id] ? 'active latched' : ''}" id="listen-${ch.id}">${iconSpeaker}</div>
          <div class="ch-info">
            <div class="ch-name" id="name-${ch.id}">${ch.name}</div>
            <div class="ch-type" id="type-${ch.id}">${ch.type}</div>
          </div>
          <div class="btn-action btn-talk ${state.talkStates[ch.id] ? 'active latched' : ''}" id="talk-${ch.id}">${iconMic}</div>
        </div>
        <div class="ch-meter-container"><div class="ch-meter-fill" id="ch-meter-fill-${ch.id}"></div></div>
        <div class="btn-expand" id="expand-${ch.id}">○ ○ ○</div>
      `;
      els.chWrap.appendChild(card);

      const slider = card.querySelector(`#vol-${ch.id}`);
      const fill = card.querySelector(`#fill-${ch.id}`);
      const leftMeter = card.querySelector(`#meter-${ch.id}`);
      
      slider.value = (state.channelVolumes[ch.id] / 3.0) * 100;
      fill.style.width = slider.value + '%';
      leftMeter.style.height = slider.value + '%';

      slider.addEventListener('input', (e) => {
        const valStr = e.target.value + '%';
        fill.style.width = valStr;
        leftMeter.style.height = valStr;
        state.channelVolumes[ch.id] = (e.target.value / 100) * 3.0;
        updateAudioRouting(); 
      });

      card.querySelector(`#expand-${ch.id}`).addEventListener('click', () => card.classList.toggle('expanded'));
      setupPTTButton(card.querySelector(`#listen-${ch.id}`), 'listen', ch.id);
      setupPTTButton(card.querySelector(`#talk-${ch.id}`), 'talk', ch.id);

    function initChannelsDOM() {
      els.chWrap.innerHTML = '';
      channels.forEach(ch => createChannelCard(ch));
    }
    initChannelsDOM();

    els.btnAddCh.onclick = () => {
      const id = 'ch' + Date.now();
      const newCh = { id, name: 'New PL', type: 'PL' };
      channels.push(newCh);
      createChannelCard(newCh);
      setupChannelAudio(newCh.id);
      
      state.registeredUsers.forEach(uid => {
          if (!state.userAssignments[uid]) state.userAssignments[uid] = [];
          state.userAssignments[uid].push(id);
      });
      
      Object.values(state.dataConns).forEach(conn => {
        if(conn && conn.open) conn.send({ type: 'add-channel', ch: newCh, assignments: state.userAssignments, registered: state.registeredUsers });
      });
      
      Object.values(state.mediaCalls).forEach(call => {
        if (call.source && audioCtx) {
           const splitGain = audioCtx.createGain();
           splitGain.gain.value = 0;
           call.source.connect(splitGain);
           splitGain.connect(state.channelNodes[newCh.id].analyser);
           call.chGains[newCh.id] = splitGain;
        }
      });
      saveRoomState();
      updateAdminMatrix(); // 追加などのDOM構造変化は全体再描画
    };

    function removeChannel(chId) {
      channels = channels.filter(c => c.id !== chId);
      const card = document.getElementById(`card-${chId}`);
      if(card) card.remove();
      
      delete state.listenStates[chId];
      delete state.talkStates[chId];
      if (state.channelNodes[chId] && audioCtx) {
        state.channelNodes[chId].masterGain.disconnect();
        delete state.channelNodes[chId];
      }
      Object.keys(state.userAssignments).forEach(uid => {
         state.userAssignments[uid] = state.userAssignments[uid].filter(id => id !== chId);
      });
      updateAudioRouting();
    }

    let audioCtx, masterAnalyser, localMicAnalyser;

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterAnalyser = audioCtx.createAnalyser();
        masterAnalyser.fftSize = 256;
        masterAnalyser.connect(audioCtx.destination);
        
        if (state.localStream) {
          const localSrc = audioCtx.createMediaStreamSource(state.localStream);
          localMicAnalyser = audioCtx.createAnalyser();
          localMicAnalyser.fftSize = 256;
          localSrc.connect(localMicAnalyser);
        }

        startMeterDraw();
        channels.forEach(ch => setupChannelAudio(ch.id));
      }
      if(audioCtx.state === 'suspended') audioCtx.resume();

      Object.values(state.mediaCalls).forEach(callData => {
        if (!callData.source) setupPeerMixer(callData);
      });
    }

    function setupChannelAudio(chId) {
      if (!audioCtx || state.channelNodes[chId]) return;
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      analyser.connect(masterGain);
      masterGain.connect(masterAnalyser);
      state.channelNodes[chId] = { analyser, masterGain };
    }

    function setupPeerMixer(callData) {
      if(!audioCtx || !callData.stream) return;
      const source = audioCtx.createMediaStreamSource(callData.stream);
      callData.source = source;
      callData.chGains = {};
      
      channels.forEach(ch => {
        const splitGain = audioCtx.createGain();
        splitGain.gain.value = 0;
        source.connect(splitGain);
        if(state.channelNodes[ch.id]) splitGain.connect(state.channelNodes[ch.id].analyser);
        callData.chGains[ch.id] = splitGain;
      });
      updateAudioRouting();
    }

    function startMeterDraw() {
      const masterData = new Uint8Array(masterAnalyser.frequencyBinCount);
      let localData = null;
      if (localMicAnalyser) localData = new Uint8Array(localMicAnalyser.frequencyBinCount);

      function draw() {
        requestAnimationFrame(draw);
        
        masterAnalyser.getByteFrequencyData(masterData);
        let sum = 0;
        for(let i=0; i<masterData.length; i++) sum += masterData[i];
        let masterPercent = ((sum / masterData.length) / 255) * 100 * 2.0; 
        els.masterMeterFill.style.width = Math.min(masterPercent, 100) + '%';

        let localPercent = 0;
        if (localMicAnalyser && localData) {
          localMicAnalyser.getByteFrequencyData(localData);
          let lSum = 0;
          for(let i=0; i<localData.length; i++) lSum += localData[i];
          localPercent = ((lSum / localData.length) / 255) * 100 * 2.0;
        }

        channels.forEach(ch => {
          if (state.channelNodes[ch.id]) {
            const chData = new Uint8Array(state.channelNodes[ch.id].analyser.frequencyBinCount);
            state.channelNodes[ch.id].analyser.getByteFrequencyData(chData);
            let chSum = 0;
            for(let i=0; i<chData.length; i++) chSum += chData[i];
            let chPercent = ((chSum / chData.length) / 255) * 100 * 2.5;
            
            if (state.talkStates[ch.id]) {
              chPercent = Math.max(chPercent, localPercent);
            }
            
            const meterEl = document.getElementById(`ch-meter-fill-${ch.id}`);
            if (meterEl) meterEl.style.width = Math.min(chPercent, 100) + '%';
          }
        });
      }
      draw();
    }

    function updateAudioRouting() {
      const isAnyTalkOn = Object.values(state.talkStates).some(val => val === true);
      if (state.localStream) {
        state.localStream.getAudioTracks().forEach(t => t.enabled = isAnyTalkOn);
      }
      if (!audioCtx) return;

      channels.forEach(ch => {
        if (state.channelNodes[ch.id]) {
          const vol = state.listenStates[ch.id] ? state.channelVolumes[ch.id] : 0;
          state.channelNodes[ch.id].masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
        }
      });

      for (const peerId in state.mediaCalls) {
        const callData = state.mediaCalls[peerId];
        const remoteTalk = state.remoteTalkStates[peerId] || {};

        channels.forEach(ch => {
          if (callData.chGains && callData.chGains[ch.id]) {
            const isTalking = remoteTalk[ch.id] === true;
            callData.chGains[ch.id].gain.setTargetAtTime(isTalking ? 1 : 0, audioCtx.currentTime, 0.05);
          }
        });
      }
    }

    function syncTalkStates() {
      const msg = { type: 'update-talk-states', states: state.talkStates };
      Object.values(state.dataConns).forEach(conn => {
        if(conn && conn.open) conn.send(msg);
      });
    }

    function setupPTTButton(btn, type, channelId) {
      let isDown = false, startX = 0, hasDragged = false;
      let isLatched = btn.classList.contains('latched'); 
      const slideDir = type === 'listen' ? 1 : -1;

      function applyState(active) {
        let changed = false;
        const card = document.getElementById(`card-${channelId}`);
        
        if (type === 'talk' && state.talkStates[channelId] !== active) {
          state.talkStates[channelId] = active; changed = true;
          if (card) { if(active) card.classList.add('talk-on'); else card.classList.remove('talk-on'); }
        }
        if (type === 'listen' && state.listenStates[channelId] !== active) {
          state.listenStates[channelId] = active; changed = true;
          if (card) { if(active) card.classList.add('listen-on'); else card.classList.remove('listen-on'); }
        }
        updateAudioRouting();
        if (changed && type === 'talk') syncTalkStates();
      }

      btn.addEventListener('pointerdown', (e) => {
        btn.setPointerCapture(e.pointerId);
        isDown = true; startX = e.clientX; hasDragged = false;
        els.dummyAudio.play().catch(()=>{});
        if (!isLatched) { btn.classList.add('active'); applyState(true); }
      });

      btn.addEventListener('pointermove', (e) => {
        if (!isDown) return;
        const deltaX = e.clientX - startX;
        if ((slideDir === 1 && deltaX > 0) || (slideDir === -1 && deltaX < 0)) {
          e.preventDefault(); 
          btn.style.transform = `translateX(${deltaX}px)`;
          if (Math.abs(deltaX) > 30 && !isLatched) {
            hasDragged = true; isLatched = true;
            btn.classList.add('latched');
            if (navigator.vibrate) navigator.vibrate(50);
          }
        }
      });

      const release = (e) => {
        if (!isDown) return;
        isDown = false; btn.style.transform = `translateX(0px)`;
        if (hasDragged) applyState(true);
        else {
          if (isLatched) { isLatched = false; btn.classList.remove('latched', 'active'); applyState(false); }
          else { btn.classList.remove('active'); applyState(false); }
        }
      };
      btn.addEventListener('pointerup', release);
      btn.addEventListener('pointercancel', release);
    }

    function syncChannelInfo() {
      Object.values(state.dataConns).forEach(conn => {
        if(conn && conn.open) conn.send({ type: 'update-ch-info', data: channels });
      });
    }
