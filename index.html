<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>YY-Talk PRO - Perfect PTT</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script>
    window.onerror = function(message, source, lineno) {
      alert("【システムエラー検知】\n" + message + "\n行: " + lineno);
    };

    // Opus DTX (無音時の通信量削減)
    const origSetLocalDescription = RTCPeerConnection.prototype.setLocalDescription;
    RTCPeerConnection.prototype.setLocalDescription = function(desc) {
      if (desc && (desc.type === 'offer' || desc.type === 'answer')) {
        desc.sdp = desc.sdp.replace(/(a=fmtp:111.*)/g, '$1;usedtx=1');
      }
      return origSetLocalDescription.apply(this, arguments);
    };
  </script>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <style>
    :root {
      --bg-dark: #0a0b0d; --card-bg: #1c1d21; --card-bg-expanded: #24262b;
      --text-main: #ffffff; --text-sub: #7a7e85;
      --green: #4ade80; --red: #dc2626; --alert: #ef4444;
      --orange: #f97316; --blue: #3b82f6;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      -webkit-touch-callout: none; 
      -webkit-user-select: none; 
      user-select: none; 
    }
    input, select, textarea { -webkit-user-select: auto; user-select: auto; touch-action: auto; }
    
    /* ★ 改善: 他の成功アプリと同じ、最も安定した100dvhレイアウト */
    html, body {
      margin: 0; padding: 0; 
      width: 100%; height: 100%;
      background-color: #121418; color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overscroll-behavior: none; /* バウンススクロール防止 */
      overflow-x: hidden;
      overflow-y: auto; /* 横向き時など入り切らない場合はスクロールを許可 */
    }

    .app-container {
      width: 100%;
      height: 100dvh; /* 最新の動的ビューポート高（アドレスバーを自動計算） */
      min-height: 380px; /* ★ 横向き等でこれより縮んだら画面全体をスクロールさせる */
      background-color: var(--bg-dark);
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      body { display: flex; justify-content: center; align-items: center; }
      .app-container {
        height: 94vh; max-height: 1200px; min-height: 600px; width: 96vw; max-width: 1800px;
        border-radius: 20px; border: 8px solid #1e2128;
      }
    }

    /* モーダル・オーバーレイ類 */
    .overlay-base { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); z-index: 1000; overflow-y: auto; touch-action: pan-y;}
    #login-overlay { z-index: 2000; }
    #audio-overlay { z-index: 1100; }
    .btn-green-solid { background: var(--green); color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; }

    /* ログイン画面 */
    .login-modal { background: var(--card-bg); padding: 25px 20px; border-radius: 12px; width: 90%; max-width: 340px; border: 1px solid #3a3c42; position: relative; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin: auto; }
    .login-modal .btn-close-login { position: absolute; top: 12px; right: 15px; background: transparent; border: none; color: #9ca3af; font-size: 28px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; z-index: 2010; font-weight: normal; }
    .login-modal input { width: 100%; padding: 12px; background: #0a0b0d; border: 1px solid #3a3c42; color: #fff; border-radius: 8px; font-size: 16px; text-align: center;}
    .login-modal button:not(.btn-close-login) { padding: 14px; border: none; border-radius: 8px; font-weight: bold; color: #000; cursor: pointer; font-size: 15px; z-index: 2001; }
    .login-modal button:not(.btn-close-login):disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-join-member { background: var(--orange); width: 100%; } .btn-join-admin { background: transparent; border: 1.5px solid var(--blue) !important; color: var(--blue) !important; width: 100%; } .btn-stop { background: var(--red); width: 100%; }
    .status-text { font-size: 12px; color: var(--text-sub); text-align: center; margin-top: 5px; font-family: 'JetBrains Mono', monospace;}

    /* パッチパネル */
    .admin-modal { max-width: 95%; width: auto; min-width: 320px; }
    @media (min-width: 800px) { .admin-modal { max-width: 1200px; } }
    .scroll-area { max-height: 75vh; overflow: auto; padding-right: 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .admin-matrix-wrapper { width: 100%; overflow-x: auto; overscroll-behavior-x: none; -webkit-overflow-scrolling: touch; border-radius: 8px; background: #0a0b0d; border: 1px solid #3a3c42; position: relative; }
    .admin-matrix { width: 100%; border-collapse: separate; border-spacing: 0; min-width: max-content; text-align: center; font-size: 13px; }
    .admin-matrix th, .admin-matrix td { border-bottom: 1px solid #3a3c42; border-right: 1px solid #3a3c42; padding: 6px; }
    .admin-matrix th { background-color: #1c1d21; color: var(--text-sub); font-weight: normal; position: sticky; top: 0; z-index: 5; border-top: 1px solid #3a3c42; min-width: 80px; }
    .diagonal-header { position: sticky; left: 0; z-index: 10 !important; min-width: 120px; min-height: 40px; background: linear-gradient(to top right, #1c1d21 49%, #3a3c42 49%, #3a3c42 51%, #1c1d21 51%); border-right: 2px solid #3a3c42 !important; box-shadow: 2px 0 5px rgba(0,0,0,0.4); }
    .diagonal-header .dh-member { position: absolute; top: 4px; right: 10px; font-weight: bold; color: var(--text-main); font-size: 11px; }
    .diagonal-header .dh-party { position: absolute; bottom: 4px; left: 10px; font-weight: bold; color: var(--text-main); font-size: 11px; }
    .matrix-user-header { cursor: pointer; transition: background 0.2s; }
    .admin-matrix td.ch-cell { text-align: left; background-color: #0a0b0d; min-width: 120px; padding: 6px; position: sticky; left: 0; z-index: 9; border-right: 2px solid #3a3c42 !important; box-shadow: 2px 0 5px rgba(0,0,0,0.4); }
    .matrix-toggle { width: 24px; height: 24px; border-radius: 50%; margin: 0 auto; background: #1c1d21; border: 2px solid #3a3c42; cursor: pointer; transition: 0.15s ease-out; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .matrix-toggle.active { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); transform: scale(1.1); }
    .btn-delete-col, .btn-delete-row { background: var(--red); color: #fff; border: none; border-radius: 6px; cursor: pointer; padding: 6px 12px; font-size: 11px; transition: all 0.2s; display: inline-block; font-weight: bold; }
    .btn-delete-row { margin-top: 0; }
    .admin-matrix td.ch-cell input.admin-edit-type { width: 48px; text-align:center; font-family:'JetBrains Mono', monospace; background:#1c1d21; border:1px solid #3a3c42; color:#fff; border-radius:4px; font-size:10px; padding:4px; }

    /* メインヘッダー */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-dark); flex-shrink: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; }
    #app-logo { height: 26px; width: auto; margin-right: 5px; }
    @media (min-width: 600px) { #app-logo { height: 32px; } }
    .header-right { display: flex; align-items: center; gap: 12px; color: var(--text-sub); font-size: 13px; font-weight: bold; }
    .btn-login-trigger { display: flex; align-items: center; justify-content: center; background: transparent; border: 1.5px solid var(--text-sub); color: var(--text-sub); padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .btn-login-trigger.online { border-color: var(--blue); color: var(--blue); }
    #btn-settings { padding: 6px; border-color: var(--text-sub); }
    #btn-settings svg { width: 18px; height: 18px; fill: var(--text-sub); }
    #btn-settings.online svg { fill: var(--green); border-color: var(--green); }
    #btn-settings.admin-only { display: none; }

    .global-controls { display: flex; gap: 10px; padding: 5px 15px 10px; background: var(--bg-dark); border-bottom: 2px solid var(--green); flex-shrink: 0; z-index: 10;}
    .btn-global { flex: 1; padding: 8px 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'JetBrains Mono', monospace; }

    .slash-line { display: none; }
    .muted-slash .slash-line { display: block; opacity: 1; }

    @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    .btn-master-spk { background: #1c1d21; color: var(--text-main); border: 1px solid #3a3c42; }
    .btn-master-spk.active { background: var(--green); color: #000; border-color: var(--green); animation: pulse-green 1.5s infinite; }
    .btn-master-mic { background: #1c1d21; color: var(--text-main); border: 1px solid #3a3c42; }
    .btn-master-mic.active { background: var(--red); color: #000; border-color: var(--red); animation: pulse-red 1.5s infinite; }

    /* チャンネルリスト */
    .channel-list-container { 
      flex: 1 1 auto; overflow-y: auto; padding: 10px 15px 20px; 
      display: flex; flex-direction: column; gap: 10px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch; min-height: 0; z-index: 1;
      touch-action: pan-y; /* 縦スクロールのみ許可 */
    }
    .channel-list-container::-webkit-scrollbar { display: none; }
    #channel-list-wrap { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 600px) { #channel-list-wrap { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; } }

    .channel-card { background-color: var(--card-bg); border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s ease; }
    .channel-card.expanded { background-color: var(--card-bg-expanded); }
    .channel-card::before, .channel-card::after { content: ""; position: absolute; top: 0; bottom: 0; width: 50%; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 0; }
    .channel-card::before { left: 0; background: linear-gradient(to right, rgba(74, 222, 128, 0.25) 0%, transparent 100%); }
    .channel-card::after { right: 0; background: linear-gradient(to left, rgba(220, 38, 38, 0.25) 0%, transparent 100%); }
    .channel-card.listen-on::before { opacity: 1; }
    .channel-card.talk-on::after { opacity: 1; }
    .channel-card > * { position: relative; z-index: 1; }

    .status-line-bg { position: absolute; left: 0; top: 10%; bottom: 10%; width: 4px; background-color: #0a0b0d; border-radius: 0 4px 4px 0; overflow: hidden; z-index: 2; }
    .status-line-fill { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; transition: height 0.1s; background: linear-gradient(to top, #4ade80 0%, #4ade80 40%, #eab308 75%, #f87171 100%); }

    .volume-panel { display: none; padding: 5px 20px; align-items: center; gap: 10px; }
    .channel-card.expanded .volume-panel { display: flex; }
    .vol-icon { width: 14px; height: 14px; fill: var(--text-sub); flex-shrink: 0; }
    .vol-slider-wrap { flex: 1; position: relative; display: flex; align-items: center; touch-action: pan-x; }
    .vol-slider-track-bg { position: absolute; left: 0; right: 0; height: 4px; background: #3a3c42; border-radius: 2px; z-index: 1; }
    .vol-slider-fill { position: absolute; left: 0; height: 4px; background: var(--orange); border-radius: 2px; z-index: 2; width: 50%; pointer-events: none; }
    input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; height: 30px; position: relative; z-index: 3; margin: 0; outline: none; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 30px; background: transparent; border: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ffffff; box-shadow: 0 0 8px rgba(0,0,0,0.6); cursor: pointer; margin-top: 6px; }

    .main-controls { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; position: relative; }
    .ch-info { text-align: center; flex: 1; padding: 0 5px; }
    .ch-name { font-size: 15px; font-weight: 500; margin-bottom: 0px; display: inline-block; padding: 2px 6px; border-radius: 4px; }
    .ch-type { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-sub); display: inline-block; padding: 0px 6px; border-radius: 4px; pointer-events: auto; }

    .btn-action { width: 50px; height: 50px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; background: #1c1d21; touch-action: none; z-index: 10; user-select: none; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.05); cursor: pointer; }
    .btn-icon { width: 24px; height: 24px; fill: currentColor; pointer-events: none; }
    .btn-listen { border-color: var(--green); color: var(--green); }
    .btn-listen.active, .btn-listen.latched { background-color: var(--green); color: var(--bg-dark); box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 4px 15px rgba(74, 222, 128, 0.5); }
    .btn-talk { border-color: var(--red); color: var(--red); }
    .btn-talk.active, .btn-talk.latched { background-color: var(--red); color: var(--text-main); box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 4px 15px rgba(220, 38, 38, 0.5); }

    .ch-meter-container { height: 4px; background: #0a0b0d; margin: 0 45px 0; border-radius: 2px; overflow: hidden; position: relative; opacity: 0.8; }
    .ch-meter-fill { height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, #4ade80 0%, #4ade80 60%, #eab308 80%, #f87171 100%); }
    
    .btn-expand { display: inline-block; padding: 4px 40px; color: var(--text-sub); font-size: 14px; letter-spacing: 2px; cursor: grab; margin: 0 auto; border-radius: 20px; touch-action: none;}
    .btn-expand:active { cursor: grabbing; background-color: rgba(255,255,255,0.05); }
    
    /* ドラッグ時のデザイン */
    .sortable-ghost { opacity: 0.2 !important; background-color: #000 !important; border: 1px dashed #3a3c42 !important; }
    .sortable-drag { cursor: grabbing !important; box-shadow: 0 30px 60px rgba(0,0,0,0.8) !important; transform: scale(1.05) !important; background-color: var(--card-bg-expanded) !important; border: 1px solid var(--text-sub) !important; opacity: 1 !important; z-index: 9999 !important; }

    .master-meter-container { height: 8px; width: 100%; background: #1c1d21; position: relative; flex-shrink: 0; z-index: 10;}
    .master-meter-fill { height: 100%; width: 0%; transition: width 0.05s linear; background: linear-gradient(90deg, #4ade80 0%, #4ade80 60%, #eab308 80%, #f87171 100%); }

    /* 横向き時のさらなるスリム化 */
    @media (orientation: landscape) and (max-height: 500px) {
      .header { padding: 2px 15px; border-bottom: 1px solid #1e2128; }
      #app-logo { height: 20px; } 
      .global-controls { padding: 2px 15px; gap: 8px; }
      .btn-global { padding: 4px 8px; font-size: 11px; height: 28px; }
      .channel-list-container { padding: 4px 15px; gap: 6px;}
      #channel-list-wrap { grid-template-columns: 1fr 1fr; gap: 6px; } 
      .main-controls { padding: 4px 10px; }
      .btn-action { width: 40px; height: 40px; border-width: 1.5px; }
      .btn-icon { width: 20px; height: 20px; }
      .ch-name { font-size: 13px; }
      .ch-type { font-size: 9px; }
      .card-footer { padding: 0 10px 2px !important; }
      .btn-expand { padding: 2px 30px !important; font-size: 12px !important; }
      .master-meter-container { height: 6px; }
    }
  </style>
</head>
<body>

  <div class="app-container" id="main-app-container">
    
    <div id="audio-overlay" class="overlay-base">
      <p style="font-weight:bold; margin-bottom:20px; font-size: 18px;">通話に参加しますか？</p>
      <button id="btn-enable-audio" class="btn-green-solid">音声を有効にして参加</button>
    </div>

    <div id="login-overlay" class="overlay-base" style="display: flex;">
      <div class="login-modal">
        <button class="btn-close-login" id="btn-close-login">×</button>
        <h3 style="margin: 0 0 5px 0; text-align: center; color: var(--text-main);">Network Login</h3>
        <input id="host-id" type="text" placeholder="ルーム名 (日本語もOK)">
        <input id="join-userid" type="text" placeholder="ユーザーID (例: Cam1)">
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn-join-member" id="btn-join-member" disabled>システム準備中...</button>
          <button class="btn-join-admin" id="btn-join-admin" disabled>システム準備中...</button>
        </div>
        <button class="btn-stop" id="btn-stop">Disconnect</button>
        <div class="status-text" id="status-msg">待機中... ルーム名を入力して接続</div>
        <div class="status-text" style="color: var(--blue);">My ID: <span id="status-my-id">-</span></div>
      </div>
    </div>

    <div id="admin-overlay" class="overlay-base">
      <div class="login-modal admin-modal">
        <button class="btn-close-login" id="btn-close-admin">×</button>
        <h3 style="margin: 0 0 15px 0; text-align: center; color: var(--text-main);">パッチパネル</h3>
        <div class="scroll-area">
          <div id="admin-matrix-container"></div>
          <button id="btn-add-ch" style="background:transparent; border:1px solid var(--green); color:var(--green); width:100%; padding:10px; margin-top:15px; border-radius:8px; cursor:pointer; font-weight:bold; transition: background 0.2s;">＋ 新規パーティーを追加</button>
        </div>
      </div>
    </div>

    <audio id="dummy-audio" loop playsinline src="https://raw.githubusercontent.com/anars/blank-audio/master/250-milliseconds-of-silence.mp3"></audio>

    <div class="header">
      <div class="header-left">
        <svg id="app-logo" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
            </linearGradient>
          </defs>
          <path d="M 12 30 L 20 42 L 20 54 M 28 30 L 20 42" stroke="url(#logo-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <path d="M 12 20 Q 20 12 28 20 M 6 12 Q 20 0 34 12" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round" fill="none" />
          <path d="M 42 30 L 50 42 L 50 54 M 58 30 L 50 42" stroke="url(#logo-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <path d="M 42 20 Q 50 12 58 20 M 36 12 Q 50 0 64 12" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round" fill="none" />
          <text x="75" y="44" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="34" fill="var(--text-main)" letter-spacing="-1">Talk</text>
        </svg>
        <span id="header-room-name" style="margin-left: 8px; font-size: 13px; color: var(--text-sub); font-family: 'JetBrains Mono', monospace;"></span>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="btn-login-trigger admin-only"></button>
        <span id="status-role" style="color: var(--orange); font-family: 'JetBrains Mono', monospace;">Offline</span>
        <button id="btn-show-login" class="btn-login-trigger">Login</button>
      </div>
    </div>

    <div class="global-controls">
      <button id="btn-master-spk" class="btn-global btn-master-spk"><span id="global-spk-icon"></span> SPK MUTE</button>
      <button id="btn-master-mic" class="btn-global btn-master-mic"><span id="global-mic-icon"></span> MIC MUTE</button>
    </div>

    <div class="channel-list-container">
      <div id="channel-list-wrap"></div>
    </div>

    <div class="master-meter-container">
      <div class="master-meter-fill" id="master-meter-fill"></div>
    </div>

  </div>

  <script>
    // ピンチイン拡大の完全ブロック
    document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) { 
      const now = (new Date()).getTime(); 
      if (now - lastTouchEnd <= 300) { e.preventDefault(); } lastTouchEnd = now; 
    }, { passive: false });
    window.addEventListener('contextmenu', e => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') e.preventDefault(); });

    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
      set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} },
      remove: (key) => { try { localStorage.removeItem(key); } catch(e) {} }
    };

    const LocalProfile = {
      get: () => { try { return JSON.parse(safeStorage.get('yytalk_user_profile')); } catch(e) { return null; } },

    function resetAndApplyChannels(newChannels, newAssignments, newRegistered) {
        if (audioCtx) {
           Object.values(state.channelNodes).forEach(node => { try { node.masterGain.disconnect(); } catch(e){} });
           Object.values(state.mediaCalls).forEach(call => { Object.values(call.chGains || {}).forEach(g => { try { g.disconnect(); } catch(e){} }); call.chGains = {}; });
        }
        state.channelNodes = {}; channels = newChannels;
        if (newAssignments) state.userAssignments = newAssignments;
        if (newRegistered) { state.registeredUsers = newRegistered; } else { state.registeredUsers = Object.keys(state.userAssignments || {}); }
        initChannelsDOM();
        
        if (audioCtx) {
           channels.forEach(ch => setupChannelAudio(ch.id));
           Object.values(state.mediaCalls).forEach(call => {
              if (call.source) {
                  channels.forEach(ch => {
                      const splitGain = audioCtx.createGain(); splitGain.gain.value = 0; call.source.connect(splitGain);
                      if(state.channelNodes[ch.id]) splitGain.connect(state.channelNodes[ch.id].analyser);
                      call.chGains[ch.id] = splitGain;
                  });
              }
           });
        }
        if (state.userAssignments && state.myUserId) { applyAssignments(state.userAssignments[state.myUserId] || channels.map(c=>c.id)); } else { applyAssignments(channels.map(c=>c.id)); }
        updateAudioRouting(); updateChannelIcons();

      const defaultChannels = [

      ];

      const id = 'ch' + Date.now(); const newCh = { id, name: 'New PL', type: 'PL' }; channels.push(newCh);

    function removeChannel(chId) {
      channels = channels.filter(c => c.id !== chId); const card = document.getElementById(`card-${chId}`); if(card) card.remove();
      delete state.listenStates[chId]; delete state.talkStates[chId];
      if (state.channelNodes[chId] && audioCtx) { state.channelNodes[chId].masterGain.disconnect(); delete state.channelNodes[chId]; }
      Object.keys(state.userAssignments).forEach(uid => { state.userAssignments[uid] = state.userAssignments[uid].filter(id => id !== chId); });
      updateAudioRouting(); updateChannelIcons();

    let audioCtx, masterAnalyser, localMicAnalyser;

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterAnalyser = audioCtx.createAnalyser(); masterAnalyser.fftSize = 256; masterAnalyser.connect(audioCtx.destination);
        if (state.localStream) { const localSrc = audioCtx.createMediaStreamSource(state.localStream); localMicAnalyser = audioCtx.createAnalyser(); localMicAnalyser.fftSize = 256; localSrc.connect(localMicAnalyser); }
        startMeterDraw(); channels.forEach(ch => setupChannelAudio(ch.id));
      }
      if(audioCtx.state === 'suspended') audioCtx.resume();
      Object.values(state.mediaCalls).forEach(callData => { if (!callData.source) setupPeerMixer(callData); });
    }

    function setupChannelAudio(chId) {
      if (!audioCtx || state.channelNodes[chId]) return;
      const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
      const masterGain = audioCtx.createGain(); masterGain.gain.value = 0;
      analyser.connect(masterGain); masterGain.connect(masterAnalyser);
      state.channelNodes[chId] = { analyser, masterGain };
    }

    function setupPeerMixer(callData) {
      if(!audioCtx || !callData.stream) return;
      const source = audioCtx.createMediaStreamSource(callData.stream); callData.source = source;
      const peerAnalyser = audioCtx.createAnalyser(); peerAnalyser.fftSize = 256; source.connect(peerAnalyser); callData.analyser = peerAnalyser;
      callData.chGains = {};
      channels.forEach(ch => {
        const splitGain = audioCtx.createGain(); splitGain.gain.value = 0; source.connect(splitGain);
        if(state.channelNodes[ch.id]) splitGain.connect(state.channelNodes[ch.id].analyser);
        callData.chGains[ch.id] = splitGain;
      });
      updateAudioRouting();
    }

    let lastDrawTime = 0;
    function startMeterDraw() {
      const masterData = new Uint8Array(masterAnalyser.frequencyBinCount);
      let localData = localMicAnalyser ? new Uint8Array(localMicAnalyser.frequencyBinCount) : null;

      function draw(timestamp) {
        requestAnimationFrame(draw);
        if (timestamp - lastDrawTime < 30) return; lastDrawTime = timestamp;
        
        masterAnalyser.getByteFrequencyData(masterData);
        let sum = 0; for(let i=0; i<masterData.length; i++) sum += masterData[i];
        els.masterMeterFill.style.width = Math.min(((sum / masterData.length) / 255) * 100 * 2.0, 100) + '%';

        let localPercent = 0;
        if (localMicAnalyser && localData) {
          localMicAnalyser.getByteFrequencyData(localData);
          let lSum = 0; for(let i=0; i<localData.length; i++) lSum += localData[i];
          localPercent = ((lSum / localData.length) / 255) * 100 * 2.0;
        }

        channels.forEach(ch => {
          if (state.channelNodes[ch.id]) {
            const chData = new Uint8Array(state.channelNodes[ch.id].analyser.frequencyBinCount);
            state.channelNodes[ch.id].analyser.getByteFrequencyData(chData);
            let chSum = 0; for(let i=0; i<chData.length; i++) chSum += chData[i];
            let chPercent = ((chSum / chData.length) / 255) * 100 * 2.5;
            if (state.talkStates[ch.id]) chPercent = Math.max(chPercent, localPercent);
            const meterEl = document.getElementById(`ch-meter-fill-${ch.id}`);
            if (meterEl) meterEl.style.width = Math.min(chPercent, 100) + '%';
          }
        });

        if (state.isAdmin) {
          state.registeredUsers.forEach(uid => {
            const meterEl = document.getElementById(`user-meter-${uid}`);
            if (meterEl) {
              let maxVal = 0;
              if (uid === state.myUserId) { maxVal = localPercent; } 
              else {
                const peerId = Object.keys(state.users).find(p => state.users[p] === uid);
                if (peerId && state.mediaCalls[peerId] && state.mediaCalls[peerId].analyser) {
                  const pAnalyser = state.mediaCalls[peerId].analyser; const pData = new Uint8Array(pAnalyser.frequencyBinCount); pAnalyser.getByteFrequencyData(pData);
                  let pSum = 0; for(let i=0; i<pData.length; i++) pSum += pData[i]; maxVal = ((pSum / pData.length) / 255) * 100 * 2.0;
                }
              }
              meterEl.style.height = Math.min(maxVal, 100) + '%';
            }
          });
        }
      }
      draw(0);
    }

    function updateAudioRouting() {
      let isLocalTalking = Object.values(state.talkStates).some(val => val === true);
      if (state.isMasterMicMuted) isLocalTalking = false;
      if (state.localStream) { state.localStream.getAudioTracks().forEach(t => t.enabled = isLocalTalking); }
      if (!audioCtx) return;

      channels.forEach(ch => {
        if (state.channelNodes[ch.id]) {
          const vol = (state.listenStates[ch.id] && !state.isMasterSpkMuted) ? state.channelVolumes[ch.id] : 0;
          state.channelNodes[ch.id].masterGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
        }
      });

      for (const peerId in state.mediaCalls) {
        const callData = state.mediaCalls[peerId]; const remoteTalk = state.remoteTalkStates[peerId] || {};
        channels.forEach(ch => {
          if (callData.chGains && callData.chGains[ch.id]) {
            const isTalking = remoteTalk[ch.id] === true; callData.chGains[ch.id].gain.setTargetAtTime(isTalking ? 1 : 0, audioCtx.currentTime, 0.05);
          }
        });
      }
    }

    function syncTalkStates() {
      const msg = { type: 'update-talk-states', states: state.talkStates };
      Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send(msg); });
    }

    // ★ 改善1: PTTスワイプの完璧な挙動 (距離延長、ゴム感、ON/OFF両対応、バウンドなし)
    function setupPTTButton(btn, type, channelId) {
      if(!btn) return;
      let isDown = false, startX = 0;
      let isLatched = btn.classList.contains('latched'); 
      const slideDir = type === 'listen' ? 1 : -1;

      function applyState(active) {
        let changed = false; const card = document.getElementById(`card-${channelId}`);
        if (type === 'talk' && state.talkStates[channelId] !== active) { state.talkStates[channelId] = active; changed = true; if (card) { if(active) card.classList.add('talk-on'); else card.classList.remove('talk-on'); } }
        if (type === 'listen' && state.listenStates[channelId] !== active) { state.listenStates[channelId] = active; changed = true; if (card) { if(active) card.classList.add('listen-on'); else card.classList.remove('listen-on'); } }
        updateAudioRouting(); updateChannelIcons();
        if (changed && type === 'talk') syncTalkStates();
      }

      btn.addEventListener('pointerdown', (e) => {
        btn.setPointerCapture(e.pointerId); isDown = true; startX = e.clientX; els.dummyAudio.play().catch(()=>{});
        btn.style.transition = 'none'; // 引っ張る時はアニメーションを切る
        if (!isLatched) { btn.classList.add('active'); applyState(true); }
      });
      
      btn.addEventListener('pointermove', (e) => {
        if (!isDown) return; 
        let deltaX = e.clientX - startX;
        
        // 逆方向のスワイプは重くする（引っ張れないように）
        if ((slideDir === 1 && deltaX < 0) || (slideDir === -1 && deltaX > 0)) {
          deltaX = deltaX * 0.1;
        }

        const targetDistance = 100; // ★ロックするまでの距離（カード中央付近に延長）
        let visualMoveX = deltaX;
        
        // ★ゴムのような非線形な引き心地（強く引くほど重くなる）
        if (Math.abs(deltaX) > 20) {
            const sign = Math.sign(deltaX);
            const over = Math.abs(deltaX) - 20;
            // 0.4乗で強い減衰をかけ、さらにリアルなゴム感を出す
            visualMoveX = sign * (20 + Math.pow(over, 0.4) * 10); 
        }

        // 目標距離を超えたらON/OFFを切り替えて手を離させる
        if (Math.abs(deltaX) > targetDistance && Math.sign(deltaX) === slideDir) {
          isDown = false; 
          btn.releasePointerCapture(e.pointerId);
          btn.style.transition = 'transform 0.15s ease-out'; // ★スッと素早く戻る（バウンドしない）
          btn.style.transform = `translateX(0px)`;
          
          if (isLatched) {
            // ★オンの状態でスワイプしたらオフにする
            isLatched = false;
            btn.classList.remove('latched', 'active');
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // カチカチッという感触
            applyState(false);
          } else {
            // ★オフの状態でスワイプしたらオンにする
            isLatched = true;
            btn.classList.add('latched');
            if (navigator.vibrate) navigator.vibrate(50);
            applyState(true);
          }
          return;
        }
        
        btn.style.transform = `translateX(${visualMoveX}px)`;
      });
      
      const release = (e) => {
        if (!isDown) return; 
        isDown = false; 
        btn.style.transition = 'transform 0.15s ease-out'; // ★スッと素早く戻る
        btn.style.transform = `translateX(0px)`;
        
        if (Math.abs(e.clientX - startX) < 5) {
          // 単純なタップだった場合
          if (isLatched) { isLatched = false; btn.classList.remove('latched', 'active'); applyState(false); }
          else { btn.classList.remove('active'); applyState(false); }
        } else {
          // スワイプの途中で指を離した場合
          if (isLatched) { /* 既にロック済みならそのまま維持 */ }
          else { btn.classList.remove('active'); applyState(false); }
        }
      };
      
      btn.addEventListener('pointerup', release); btn.addEventListener('pointercancel', release);
    }

    function syncChannelInfo() { Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'update-ch-info', data: channels }); }); }

    window.toggleAllUserAssignments = function(uid) {
      if(!confirm(`ユーザー「${uid}」の全パーティーを一括でオン/オフしますか？`)) return;
      const allAssigned = channels.every(ch => state.userAssignments[uid] && state.userAssignments[uid].includes(ch.id));
      if (allAssigned) state.userAssignments[uid] = []; else state.userAssignments[uid] = channels.map(c => c.id); 
      saveRoomState(); buildAdminMatrix();
      const peerId = Object.keys(state.users).find(p => state.users[p] === uid && state.peers.has(p));
      if(peerId && state.dataConns[peerId]) state.dataConns[peerId].send({ type: 'assign-channels', channels: state.userAssignments[uid], targetUid: uid });
      if (uid === state.myUserId) applyAssignments(state.userAssignments[uid]);
      Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'assign-channels', channels: state.userAssignments[uid], targetUid: uid }); });
    };

    function buildAdminMatrix() {
      if (!state.isAdmin) return;
      const container = document.getElementById('admin-matrix-container');
      let html = `<div class="admin-matrix-wrapper"><table class="admin-matrix"><thead><tr><th class="diagonal-header"><span class="dh-member">メンバー</span><span class="dh-party">パーティー</span></th>`;
      state.registeredUsers.forEach(uid => {
          const isOnline = Array.from(state.peers).some(p => state.users[p] === uid && state.dataConns[p] && state.dataConns[p].open);
          const statusColor = isOnline ? 'var(--green)' : 'var(--text-sub)';
          html += `<th class="matrix-user-header" onclick="toggleAllUserAssignments('${uid}')"><div style="display:flex; align-items:center; justify-content:center; gap:5px; margin-bottom:6px;"><span style="color:${statusColor}; font-size:10px;">●</span><span style="font-weight:bold; color:var(--text-main); font-family: 'JetBrains Mono', monospace; font-size:13px;">${uid}</span><div style="position: relative; width: 4px; height: 14px; background: #0a0b0d; border-radius: 2px; overflow: hidden; margin-left: 2px;"><div id="user-meter-${uid}" style="position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(to top, #4ade80, #eab308, #f87171); transition: height 0.05s linear;"></div></div></div><button class="btn-delete-col" data-uid="${uid}" onclick="event.stopPropagation();">削除</button></th>`;
      });
      html += `<th><button id="btn-add-user" style="background:var(--blue); color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">＋ 追加</button></th></tr></thead><tbody>`;
      channels.forEach(ch => {
          html += `<tr><td class="ch-cell"><div style="display:flex; gap:6px; align-items:center; justify-content:space-between; width:100%;"><div style="display:flex; gap:4px; flex:1;"><input type="text" class="admin-edit-name" data-id="${ch.id}" value="${ch.name}" style="flex:1; width:70px; background:#1c1d21; border:1px solid #3a3c42; color:#fff; border-radius:4px; font-size:13px; padding:4px 6px;"><input type="text" class="admin-edit-type" data-id="${ch.id}" value="${ch.type}" style="width:48px; text-align:center; font-family:'JetBrains Mono', monospace; background:#1c1d21; border:1px solid #3a3c42; color:#fff; border-radius:4px; font-size:10px; padding:4px;"></div><button class="btn-delete-row" data-id="${ch.id}">削除</button></div></td>`;
          state.registeredUsers.forEach(uid => { const isAssigned = (state.userAssignments[uid] || []).includes(ch.id); const activeClass = isAssigned ? 'active' : ''; html += `<td><div class="matrix-toggle ${activeClass}" data-uid="${uid}" data-chid="${ch.id}"></div></td>`; });
          html += `<td></td></tr>`;
      });
      html += `</tbody></table></div>`; container.innerHTML = html;

      container.querySelectorAll('.matrix-toggle').forEach(btn => {
        btn.onclick = (e) => {
          const uid = e.target.getAttribute('data-uid'); const chid = e.target.getAttribute('data-chid'); let assigned = state.userAssignments[uid] || [];
          if (assigned.includes(chid)) { assigned = assigned.filter(id => id !== chid); e.target.classList.remove('active'); } else { assigned.push(chid); e.target.classList.add('active'); }
          state.userAssignments[uid] = assigned; saveRoomState(); if (uid === state.myUserId) applyAssignments(assigned);
          Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'assign-channels', channels: assigned, targetUid: uid }); });
        };
      });

      document.getElementById('btn-add-user').onclick = () => {
        const uid = prompt('事前登録するメンバーのユーザーIDを入力してください:');
        if (uid && uid.trim() !== '' && !state.registeredUsers.includes(uid)) { state.registeredUsers.push(uid); state.userAssignments[uid] = channels.map(c => c.id); saveRoomState(); buildAdminMatrix(); Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'update-registered', registered: state.registeredUsers }); }); }
      };

      container.querySelectorAll('.btn-delete-col').forEach(btn => {
        btn.onclick = (e) => {
          const uid = e.target.getAttribute('data-uid');
          if(confirm(`ユーザー「${uid}」をリストから削除しますか？\n(設定も消去されます)`)) { state.registeredUsers = state.registeredUsers.filter(u => u !== uid); delete state.userAssignments[uid]; saveRoomState(); buildAdminMatrix(); Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'update-registered', registered: state.registeredUsers }); }); }
        };
      });

      container.querySelectorAll('.admin-edit-name, .admin-edit-type').forEach(input => {
        input.addEventListener('change', (e) => {
          const chId = e.target.getAttribute('data-id'); const ch = channels.find(c => c.id === chId);
          if (e.target.classList.contains('admin-edit-name')) ch.name = e.target.value; if (e.target.classList.contains('admin-edit-type')) ch.type = e.target.value;
          const nameEl = document.getElementById(`name-${chId}`); const typeEl = document.getElementById(`type-${chId}`);
          if (nameEl) nameEl.textContent = ch.name; if (typeEl) typeEl.textContent = ch.type;
          saveRoomState(); syncChannelInfo();
        });
      });

      container.querySelectorAll('.btn-delete-row').forEach(btn => {
        btn.onclick = (e) => {
          const chId = e.target.getAttribute('data-id'); const ch = channels.find(c => c.id === chId);
          if(!confirm(`パーティー「${ch.name}」を削除しますか？`)) return; removeChannel(chId); saveRoomState();
          Object.values(state.dataConns).forEach(conn => { if(conn && conn.open) conn.send({ type: 'remove-channel', chId: chId }); }); buildAdminMatrix(); 
        };
      });
    }

    function applyAssignments(assignedIds) {
      if (!assignedIds) return;
      channels.forEach(ch => {
        const card = document.getElementById(`card-${ch.id}`);
        if(card) {
          if(assignedIds.includes(ch.id)) { card.style.display = 'flex'; } 
          else {
            card.style.display = 'none'; state.listenStates[ch.id] = false; state.talkStates[ch.id] = false; card.classList.remove('listen-on', 'talk-on');
            const lBtn = document.getElementById(`listen-${ch.id}`); const tBtn = document.getElementById(`talk-${ch.id}`);
            if(lBtn) { lBtn.classList.remove('active', 'latched'); lBtn.style.transform = 'translateX(0px)'; }
            if(tBtn) { tBtn.classList.remove('active', 'latched'); tBtn.style.transform = 'translateX(0px)'; }
          }
        }
      });
      updateAudioRouting(); updateChannelIcons(); syncTalkStates();
    }

    function setupDataConnection(conn) {
      if (state.dataConns[conn.peer] && state.dataConns[conn.peer].open) return; state.dataConns[conn.peer] = conn;

      const initData = () => {
        state.peers.add(conn.peer); updateUserCount(); conn.send({ type: 'hello', userId: state.myUserId, joinTime: state.joinTime }); syncTalkStates(); 
        const targetSlot = parseInt(conn.peer.split('-s')[1]);
        if (state.mySlot > targetSlot) { if (!state.mediaCalls[conn.peer]) { const call = state.peer.call(conn.peer, state.localStream); handleCall(call); } }
      };

      if (conn.open) { initData(); } else { conn.on('open', initData); }

      conn.on('data', data => {
        if (data.type === 'hello') {
          const uid = data.userId || 'Anonymous';
          if (uid !== 'Anonymous' && uid === state.myUserId) { const remoteSlot = parseInt(conn.peer.split('-s')[1]); if (state.mySlot > remoteSlot) { alert(`ユーザーID「${uid}」は現在他のオンライン端末で使用されています。別のIDで参加してください。`); LocalProfile.clear(); location.reload(); return; } else { return; } }
          state.users[conn.peer] = uid;
          if (uid !== 'Anonymous' && !state.registeredUsers.includes(uid)) { state.registeredUsers.push(uid); state.userAssignments[uid] = channels.map(c => c.id); saveRoomState(); if (state.isAdmin) buildAdminMatrix(); }
          const amILowestSlot = Array.from(state.peers).every(p => parseInt(p.split('-s')[1]) > state.mySlot);
          if(amILowestSlot) { conn.send({ type: 'init-state', channels, assignments: state.userAssignments, registered: state.registeredUsers }); }
          updateUserCount();
        }
        else if (data.type === 'init-state') { resetAndApplyChannels(data.channels, data.assignments, data.registered); saveRoomState(); if(state.isAdmin) buildAdminMatrix(); }
        else if (data.type === 'update-ch-info') {
          channels = data.data;
          channels.forEach((ch) => { const nameEl = document.getElementById(`name-${ch.id}`); const typeEl = document.getElementById(`type-${ch.id}`); if(nameEl) nameEl.textContent = ch.name; if(typeEl) typeEl.textContent = ch.type; });
          saveRoomState();
          if(state.isAdmin) { document.querySelectorAll('.admin-edit-name').forEach(input => { const ch = channels.find(c => c.id === input.getAttribute('data-id')); if(ch) input.value = ch.name; }); document.querySelectorAll('.admin-edit-type').forEach(input => { const ch = channels.find(c => c.id === input.getAttribute('data-id')); if(ch) input.value = ch.type; }); }
        }
        else if (data.type === 'update-registered') { state.registeredUsers = data.registered; saveRoomState(); if(state.isAdmin) buildAdminMatrix(); }
        else if (data.type === 'update-talk-states') { state.remoteTalkStates[conn.peer] = data.states; updateAudioRouting(); }
        else if (data.type === 'assign-channels') {
          if (data.targetUid === state.myUserId) { applyAssignments(data.channels); }
          if (data.targetUid) { state.userAssignments[data.targetUid] = data.channels; if (state.isAdmin) { document.querySelectorAll(`.matrix-toggle[data-uid="${data.targetUid}"]`).forEach(btn => { if (data.channels.includes(btn.getAttribute('data-chid'))) { btn.classList.add('active'); } else { btn.classList.remove('active'); } }); } } else { if (!state.isAdmin) applyAssignments(data.channels); }
          saveRoomState();
        }
        else if (data.type === 'add-channel') {
          channels.push(data.ch); initChannelsDOM(); setupChannelAudio(data.ch.id);
          Object.values(state.mediaCalls).forEach(call => { if (call.source && audioCtx) { const splitGain = audioCtx.createGain(); splitGain.gain.value = 0; call.source.connect(splitGain); splitGain.connect(state.channelNodes[data.ch.id].analyser); call.chGains[data.ch.id] = splitGain; } });
          if(data.registered) state.registeredUsers = data.registered; if(data.assignments) state.userAssignments = data.assignments;
          if(state.userAssignments && state.userAssignments[state.myUserId]) { applyAssignments(state.userAssignments[state.myUserId]); }
          saveRoomState(); if(state.isAdmin) buildAdminMatrix();
        }
        else if (data.type === 'remove-channel') { removeChannel(data.chId); saveRoomState(); if(state.isAdmin) buildAdminMatrix(); }
      });

      conn.on('close', () => removePeer(conn.peer)); conn.on('error', () => removePeer(conn.peer));
    }

    function removePeer(peerId) {
      if (state.dataConns[peerId] && state.dataConns[peerId].pending) return; 
      if (state.dataConns[peerId]) { try { state.dataConns[peerId].close(); } catch(e){} delete state.dataConns[peerId]; }
      state.peers.delete(peerId); delete state.remoteTalkStates[peerId];
      if (state.mediaCalls[peerId]) { Object.values(state.mediaCalls[peerId].chGains || {}).forEach(gain => { try{ gain.disconnect(); }catch(e){} }); try { state.mediaCalls[peerId].audioEl.pause(); state.mediaCalls[peerId].audioEl.srcObject = null; } catch(e){} delete state.mediaCalls[peerId]; }
      updateAudioRouting(); updateUserCount();
    }

    function updateUserCount() {
      const isOnline = state.mySlot > 0; let activeCount = isOnline ? 1 : 0;
      state.peers.forEach(p => { if (state.dataConns[p] && state.dataConns[p].open) activeCount++; });
      els.roleDisplay.textContent = `ACTIVE (${activeCount})`; els.roleDisplay.style.color = isOnline ? 'var(--blue)' : 'var(--orange)';
      if(isOnline) { els.btnLoginShow.textContent = "Connected"; els.btnLoginShow.classList.add('online'); }
      if (state.isAdmin) { document.querySelectorAll('.admin-matrix th').forEach(th => { const uidSpan = th.querySelector('span[style*="font-weight:bold"]'); if(uidSpan) { const uid = uidSpan.textContent; const isPeerOnline = Array.from(state.peers).some(p => state.users[p] === uid && state.dataConns[p] && state.dataConns[p].open); const dot = th.querySelector('span:first-child'); if(dot) dot.style.color = isPeerOnline ? 'var(--green)' : 'var(--text-sub)'; } }); }
    }

    const peerConfig = { config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' }, { urls: "stun:stun.relay.metered.ca:80" }, { urls: "turn:global.relay.metered.ca:80", username: "cce7732b3cc3adfa6f13a545", credential: "l3ACe3V84yTvkBEd" }, { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "cce7732b3cc3adfa6f13a545", credential: "l3ACe3V84yTvkBEd" }, { urls: "turn:global.relay.metered.ca:443", username: "cce7732b3cc3adfa6f13a545", credential: "l3ACe3V84yTvkBEd" }, { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "cce7732b3cc3adfa6f13a545", credential: "l3ACe3V84yTvkBEd" } ] } };

    async function initMedia() {
      try {
        els.statusMsg.textContent = "マイク起動中...";
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { alert("【警告】\nお使いのブラウザやアプリ環境ではマイク機能がサポートされていません。\n(HTTPS接続にするか、Safari/Chromeなどの通常ブラウザアプリで開き直してください)"); return false; }
        state.localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
        state.audioEnabled = true; initAudioContext(); return true;
      } catch(e) { alert("マイクへのアクセスがブロックされています。\n\n詳細: " + e.message); return false; }
    }

    const joinNetwork = async function(isAdmin) {
      if (isAdmin) {
        const pass = prompt("管理者パスワードを入力してください (ヒント: tmax)");
        if (pass !== "tmax") { alert("パスワードが違います。"); return; }
      }

      const btn = isAdmin ? els.btnJoinAdmin : els.btnJoinMember; const originalText = btn.textContent;
      btn.disabled = true; btn.textContent = "処理中..."; btn.style.opacity = "0.5";
      await new Promise(r => setTimeout(r, 50));

      if (typeof Peer === 'undefined') { alert("通信サーバーのプログラムが読み込めませんでした。\nインターネット接続を確認するか、ページを再読み込みしてください。"); btn.disabled = false; btn.textContent = originalText; btn.style.opacity = "1"; return; }
      if (!await initMedia()) { btn.disabled = false; btn.textContent = originalText; btn.style.opacity = "1"; els.statusMsg.textContent = "マイクが許可されませんでした"; return; }
      
      state.isAdmin = isAdmin; 
      const rawRoomId = els.hostIdInput.value.trim() || 'yytalk'; const myName = els.joinUserIdInput.value.trim() || 'Unknown';
      state.roomId = rawRoomId; state.myUserId = myName; state.netRoomId = 'yytalk-pro-' + encodeURIComponent(rawRoomId).replace(/%/g, '-');
      els.roomNameDisplay.textContent = `${rawRoomId}${isAdmin ? ' (Admin)' : ''}`;
      if (isAdmin) { els.btnSettings.style.display = 'flex'; els.btnSettings.innerHTML = iconSettings; } else { els.btnSettings.style.display = 'none'; }
      LocalProfile.set({ roomId: rawRoomId, userId: myName, isAdmin });
      
      els.statusMsg.textContent = "データを読み込み中..."; loadRoomState(state.roomId);
      els.statusMsg.textContent = "空きポートを検索中..."; btn.textContent = "サーバー接続中...";
      
      state.joinTime = Date.now(); let slot = 1; const maxSlots = 30;
      
      function tryConnectSlot() {
        if (slot > maxSlots) { alert("申し訳ありません、ルームが満員です（最大30人）。"); btn.disabled = false; btn.textContent = originalText; btn.style.opacity = "1"; els.statusMsg.textContent = "満員のため接続できませんでした"; return; }
        const tryId = `${state.netRoomId}-s${slot}`; state.peer = new Peer(tryId, peerConfig);
        
        state.peer.on('open', (id) => {
          state.mySlot = slot; els.myIdDisplay.textContent = `${myName} (Slot ${slot})`; els.statusMsg.textContent = "接続完了。仲間を探しています..."; setTimeout(() => els.loginOverlay.style.display = 'none', 500);
          updateUserCount(); btn.disabled = false; btn.textContent = originalText; btn.style.opacity = "1";
          state.peer.on('connection', conn => setupDataConnection(conn));
          state.peer.on('call', call => { call.answer(state.localStream); handleCall(call); });
          scanForPeers(); setInterval(() => scanForPeers(), 8000);
          setInterval(() => { state.peers.forEach(p => { if (state.dataConns[p] && !state.dataConns[p].open) removePeer(p); }); updateUserCount(); }, 10000);
        });
        
        state.peer.on('error', (err) => {
          if (err.type === 'peer-unavailable') return;
          if (state.mySlot === 0) { if (err.type === 'unavailable-id') { slot++; state.peer.destroy(); setTimeout(tryConnectSlot, 400); } else { console.error(err); els.statusMsg.textContent = "接続エラー: " + err.type; btn.disabled = false; btn.textContent = originalText; btn.style.opacity = "1"; } }
        });
      }
      tryConnectSlot();
    };

    function scanForPeers() { for (let i = 1; i < state.mySlot; i++) { const targetId = `${state.netRoomId}-s${i}`; if (!state.dataConns[targetId]) { const conn = state.peer.connect(targetId); conn.on('open', () => setupDataConnection(conn)); conn.on('error', () => {}); } } }

    window.addEventListener('DOMContentLoaded', () => {
      forceResize(); // 初期レイアウト構築
      els.btnJoinMember.addEventListener('click', () => joinNetwork(false));
      els.btnJoinAdmin.addEventListener('click', () => joinNetwork(true));
      els.btnJoinMember.textContent = "メンバーとして参加"; els.btnJoinAdmin.textContent = "管理者として参加";
      els.btnJoinMember.disabled = false; els.btnJoinAdmin.disabled = false;
      const savedProfile = LocalProfile.get();
      if (savedProfile) { els.hostIdInput.value = savedProfile.roomId || ''; els.joinUserIdInput.value = savedProfile.userId || ''; }
    });

    function handleCall(call) {
      call.on('stream', stream => {
        if (state.mediaCalls[call.peer]) return; 
        const audioEl = new Audio(); audioEl.srcObject = stream; audioEl.muted = true; audioEl.play().catch(()=>{});
        const callData = { stream, audioEl }; state.mediaCalls[call.peer] = callData;
        if (!state.audioEnabled) { els.audioOverlay.style.display = 'flex'; } else { setupPeerMixer(callData); }
        updateUserCount();
      });
      call.on('close', () => removePeer(call.peer));
    }

    document.getElementById('btn-enable-audio').onclick = () => { els.audioOverlay.style.display = 'none'; state.audioEnabled = true; initAudioContext(); };
    document.getElementById('btn-stop').onclick = () => { LocalProfile.clear(); location.reload(); };
  </script>
