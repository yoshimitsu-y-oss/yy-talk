<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveKit Connection Tester</title>
  
  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.9/dist/livekit-client.umd.min.js"></script>
  
  <style>
    body { 
        font-family: 'Consolas', 'Courier New', monospace; 
        background: #1e1e1e; 
        color: #d4d4d4; 
        padding: 20px; 
        margin: 0;
    }
    h2 { color: #569cd6; margin-top: 0;}
    .panel { 
        background: #252526; 
        border: 1px solid #444; 
        padding: 20px; 
        margin-bottom: 20px; 
        border-radius: 8px; 
    }
    h3 { margin-top: 0; color: #ce9178; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;}
    .form-group { margin-bottom: 10px; }
    label { display: inline-block; width: 150px; color: #9cdcfe; }
    input[type="text"] { 
        width: calc(100% - 170px); 
        max-width: 400px; 
        padding: 8px; 
        background: #3c3c3c; 
        color: #fff; 
        border: 1px solid #555; 
        border-radius: 4px;
        font-family: inherit;
    }
    button { 
        padding: 10px 20px; 
        margin-right: 10px; 
        margin-top: 10px;
        background: #0e639c; 
        color: #fff; 
        border: none; 
        border-radius: 4px;
        cursor: pointer; 
        font-weight: bold;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #4d4d4d; color: #888; cursor: not-allowed; }
    
    #log { 
        height: 300px; 
        overflow-y: auto; 
        background: #1e1e1e; 
        padding: 15px; 
        font-size: 13px; 
        border: 1px solid #444; 
        border-radius: 4px;
        line-height: 1.5;
    }
    .log-info { color: #cccccc; }
    .log-ok { color: #4ade80; }
    .log-err { color: #f48771; font-weight: bold; }
    
    ul { padding-left: 20px; margin: 0; }
    li { margin-bottom: 5px; }
  </style>
</head>
<body>
  <h2>LiveKit Core Function Tester</h2>
  <p style="font-size: 13px; margin-bottom: 20px;">このツールはYY-TalkのUIを排除し、サーバーとの通信ロジックだけをテストします。</p>
  
  <div class="panel">
    <h3>1. Connection Settings</h3>
    <div class="form-group">
        <label>Auth Worker URL:</label>
        <input type="text" id="auth-url" value="https://yy-talk.yoshimitsu-y.workers.dev">
    </div>
    <div class="form-group">
        <label>LiveKit WS URL:</label>
        <input type="text" id="ws-url" value="wss://yy-talk-pe8z9ycq.livekit.cloud">
    </div>
    <div class="form-group">
        <label>Room Name:</label>
        <input type="text" id="room-name" value="TestRoom">
    </div>
    <div class="form-group">
        <label>User ID:</label>
        <input type="text" id="user-id" value="TestUser">
    </div>
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
  </div>

  <div class="panel">
    <h3>2. Action Tester (Requires Connection)</h3>
    <div style="margin-bottom: 15px;">
        <button id="btn-mic" disabled>Toggle Mic</button> 
        <span id="mic-status" style="margin-left: 10px; color: #9cdcfe;">Mic: OFF</span>
    </div>
    <div>
        <input type="text" id="data-msg" placeholder="Test Message" value='{"type": "hello", "test": true}' disabled style="width: 300px;">
        <button id="btn-send" disabled>Send Data</button>
    </div>
  </div>

  <div class="panel">
    <h3>3. Participants in Room</h3>
    <ul id="participants-list" style="color: #4ade80;">(Not connected)</ul>
  </div>

  <div class="panel">
    <h3>4. System Log</h3>
    <div id="log"></div>
  </div>

  <script>
    // --- Logger Utility ---
    const el = (id) => document.getElementById(id);
    const logEl = el('log');
    
    function log(msg, type='info') {
        const d = new Date();
        const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
        const div = document.createElement('div');
        div.className = `log-${type}`;
        div.textContent = `[${time}] ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- Global State ---
    let currentRoom = null;
    let currentMicTrack = null;

    // --- 1. Connect Process ---
    el('btn-connect').onclick = async () => {
        const authUrl = el('auth-url').value.trim();
        const wsUrl = el('ws-url').value.trim();
        const roomName = el('room-name').value.trim();
        const userId = el('user-id').value.trim();

        if(!authUrl || !wsUrl || !roomName || !userId) {
            log('Error: 必要な設定が入力されていません。', 'err');
            return;
        }

        el('btn-connect').disabled = true;
        log('--- 接続プロセスを開始します ---', 'info');

        // Step A: Fetch Token from Worker
        let token = '';
        try {
            const reqUrl = `${authUrl}/?room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(userId)}`;
            log(`Workerへトークンをリクエスト中: GET ${reqUrl}`);
            
            const res = await fetch(reqUrl);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            
            const data = await res.json();
            token = data.token;
            log('トークンの取得に成功しました！', 'ok');
            log(`Token preview: ${token.substring(0, 30)}...`);
            
        } catch (e) {
            log(`[致命的エラー] トークン取得失敗: ${e.message}`, 'err');
            el('btn-connect').disabled = false;
            return;
        }

        // Step B: Connect to LiveKit
        try {
            log(`LiveKit サーバーへWebSocket接続を開始: ${wsUrl}`);
            
            currentRoom = new LivekitClient.Room({ adaptiveStream: false, dynacast: false });
            setupRoomEvents(currentRoom);

            await currentRoom.connect(wsUrl, token);
            log(`LiveKitサーバーへ正常に接続しました！ (Room: ${currentRoom.name})`, 'ok');

            // UIの有効化
            el('btn-disconnect').disabled = false;
            el('btn-mic').disabled = false;
            el('data-msg').disabled = false;
            el('btn-send').disabled = false;
            
            updateParticipants();

        } catch (e) {
            log(`[致命的エラー] LiveKit 接続失敗: ${e.message}`, 'err');
            el('btn-connect').disabled = false;
            currentRoom = null;
        }
    };

    // --- Disconnect Process ---
    el('btn-disconnect').onclick = () => {
        if(currentRoom) {
            currentRoom.disconnect();
            currentRoom = null;
        }
        if(currentMicTrack) {
            currentMicTrack.stop();
            currentMicTrack = null;
        }
        log('ユーザーによって切断されました。', 'info');
        resetUI();
    };

    function resetUI() {
        el('btn-connect').disabled = false;
        el('btn-disconnect').disabled = true;
        el('btn-mic').disabled = true;
        el('data-msg').disabled = true;
        el('btn-send').disabled = true;
        el('mic-status').textContent = 'Mic: OFF';
        el('participants-list').innerHTML = '(Not connected)';
    }

    // --- Room Events ---
    function setupRoomEvents(room) {
        room.on(LivekitClient.RoomEvent.ParticipantConnected, (p) => {
            log(`Participantが入室しました: ${p.identity}`, 'ok');
            updateParticipants();
        });
        room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (p) => {
            log(`Participantが退室しました: ${p.identity}`, 'info');
            updateParticipants();
        });
        room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
            try {
                const msg = new TextDecoder().decode(payload);
                const sender = participant?.identity || 'Server';
                log(`[データ受信] from ${sender}: ${msg}`, 'ok');
            } catch(e) {
                log(`[エラー] データのデコードに失敗しました`, 'err');
            }
        });
        room.on(LivekitClient.RoomEvent.Disconnected, () => {
            log('サーバーから切断されました (Disconnected Event)', 'err');
            resetUI();
        });
    }

    // --- Update Participant List ---
    function updateParticipants() {
        const list = el('participants-list');
        list.innerHTML = '';
        if(!currentRoom || !currentRoom.localParticipant) return;

        // 自分
        const me = document.createElement('li');
        me.innerHTML = `<strong>${currentRoom.localParticipant.identity} (あなた)</strong>`;
        list.appendChild(me);

        // 他のユーザー
        currentRoom.remoteParticipants.forEach(p => {
            const li = document.createElement('li');
            li.textContent = p.identity;
            list.appendChild(li);
        });
    }

    // --- 2. Send Data Process (パッチパネルの同期等に使われる機能) ---
    el('btn-send').onclick = async () => {
        if(!currentRoom || !currentRoom.localParticipant) return;
        const msg = el('data-msg').value;
        try {
            const payload = new TextEncoder().encode(msg);
            log(`データの送信を試みています...`);
            
            // v2.5.9 Reliable data sending fallback
            if(typeof LivekitClient.DataPacket_Kind !== 'undefined' && LivekitClient.DataPacket_Kind.RELIABLE !== undefined) {
                 await currentRoom.localParticipant.publishData(payload, LivekitClient.DataPacket_Kind.RELIABLE);
            } else {
                 await currentRoom.localParticipant.publishData(payload, { reliable: true });
            }
            log('データの送信に成功しました！(publishData OK)', 'ok');
        } catch(e) {
            log(`[エラー] データ送信失敗: ${e.message}`, 'err');
            log(`※注: canPublishData権限がない場合、ここでエラーになります。`, 'err');
        }
    };

    // --- 3. Mic Process (インカム機能) ---
    el('btn-mic').onclick = async () => {
        if(!currentRoom || !currentRoom.localParticipant) return;
        try {
            if(currentMicTrack) {
                log('マイクを停止・解除(Unpublish)しています...');
                await currentRoom.localParticipant.unpublishTrack(currentMicTrack);
                currentMicTrack.stop();
                currentMicTrack = null;
                el('mic-status').textContent = 'Mic: OFF';
                log('マイクがOFFになりました。', 'info');
            } else {
                log('マイクの許可を要求し、サーバーへ送信(Publish)しています...');
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                const audioTrack = stream.getAudioTracks()[0];
                currentMicTrack = new LivekitClient.LocalAudioTrack(audioTrack);
                
                await currentRoom.localParticipant.publishTrack(currentMicTrack, { 
                    name: 'mic', 
                    source: LivekitClient.Track.Source.Microphone 
                });
                
                el('mic-status').textContent = 'Mic: ON';
                log('マイクの送信に成功しました！(publishTrack OK)', 'ok');
            }
        } catch(e) {
            log(`[エラー] マイク操作失敗: ${e.message}`, 'err');
            log(`※注: canPublish権限がない場合、またはマイクがブロックされている場合にエラーになります。`, 'err');
        }
    };

  </script>
</body>
</html>
