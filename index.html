<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>YY-Talk PRO - Ultimate P2P</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg-dark: #0a0b0d; --card-bg: #1c1d21; --card-bg-expanded: #24262b;
      --text-main: #ffffff; --text-sub: #7a7e85;
      --green: #4ade80; --red: #f87171; --orange: #f97316; --blue: #3b82f6;
    }
    
    /* ★ 改善3&4: テキスト選択とハイライトを完全ブロック */
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      -webkit-touch-callout: none; 
      -webkit-user-select: none; 
      user-select: none; 
    }
    /* ただし入力フォームだけは文字入力できるように許可 */
    input, select { 
      -webkit-user-select: auto; 
      user-select: auto; 
    }

    body {
      margin: 0; padding: 0; background-color: #121418; color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center; 
      height: 100dvh; width: 100vw; overflow: hidden; overscroll-behavior-y: none;
    }
    .app-container {
      width: 100%; max-width: 500px; height: 100dvh; background-color: var(--bg-dark);
      display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    @media (min-width: 500px) and (min-height: 700px) {
      .app-container { height: 85vh; max-height: 880px; border-radius: 30px; border: 8px solid #1e2128; overflow: hidden; }
    }

    /* オーバーレイ */
    .overlay-base {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none;
      align-items: center; justify-content: center; z-index: 1000; flex-direction: column; backdrop-filter: blur(4px);
    }
    .modal-box {
      background: var(--card-bg); padding: 20px; border-radius: 12px; width: 92%; max-width: 400px;
      border: 1px solid #3a3c42; position: relative; display: flex; flex-direction: column; gap: 10px; max-height: 90%; overflow-y: auto;
    }
    .btn-close { position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; padding: 0; }

    /* I/O Matrix モーダル */
    .io-row { background: #0a0b0d; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #24262b; }
    .io-header { display: flex; gap: 5px; margin-bottom: 5px; }
    .io-select { flex: 3; background: #1c1d21; color: #fff; border: 1px solid #333; padding: 5px; font-size: 11px; border-radius: 4px; }
    .io-ch { flex: 1; background: #000; color: var(--green); border: 1px solid #333; padding: 5px; font-size: 11px; text-align: center; border-radius: 4px; }
    .io-checkboxes { display: flex; justify-content: space-between; padding-top: 5px; border-top: 1px solid #222; }
    .io-checkboxes label { font-size: 10px; color: var(--text-sub); display: flex; align-items: center; gap: 2px; }

    /* ヘッダー */
    .header {
      display: flex; align-items: center; justify-content: space-between; padding: 15px;
      background: var(--bg-dark); border-bottom: 2px solid var(--green); flex-shrink: 0;
    }
    .header-left { color: var(--blue); font-weight: bold; font-size: 18px; }
    .btn-header { background: transparent; border: 1px solid var(--text-sub); color: var(--text-sub); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

    /* ★ 改善1: チャンネルリスト (縦は1列、横向きは2列グリッド) */
    .channel-list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr; align-content: start; gap: 8px; }
    
    @media (orientation: landscape) and (max-height: 500px) {
      .channel-list { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 15px; }
    }

    .channel-card { background: var(--card-bg); border-radius: 10px; position: relative; overflow: hidden; transition: 0.2s; display: flex; flex-direction: column; }
    .channel-card.expanded { background: var(--card-bg-expanded); }
    .status-line { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #000; }
    .status-line-fill { position: absolute; bottom: 0; width: 100%; background: var(--green); transition: height 0.1s; }

    .main-controls { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; }
    .ch-name { font-size: 16px; font-weight: 500; text-align: center; flex: 1; pointer-events: none; }
    .btn-action {
      width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid;
      display: flex; align-items: center; justify-content: center; background: transparent;
      transition: 0.1s; touch-action: none; cursor: pointer;
    }
    .btn-listen { border-color: var(--green); color: var(--green); }
    .btn-listen.active { background: var(--green); color: #000; box-shadow: 0 0 15px rgba(74,222,128,0.4); }
    .btn-talk { border-color: var(--red); color: var(--red); }
    .btn-talk.active { background: var(--red); color: #fff; box-shadow: 0 0 15px rgba(248,113,113,0.4); }
    .btn-icon { width: 22px; height: 22px; fill: currentColor; pointer-events: none;}

    .volume-panel { display: none; padding: 0 15px 10px; flex-direction: column; gap: 5px; }
    .channel-card.expanded .volume-panel { display: flex; }
    
    /* ★ 改善2: 並べ替えボタンUI */
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding: 0 15px 5px; color: var(--text-sub); font-size: 12px; }
    .btn-sort { padding: 5px 15px; background: #333; border-radius: 4px; cursor: pointer; }
    .btn-expand { cursor: pointer; padding: 5px 20px; letter-spacing: 2px; }

    .master-meter { height: 6px; background: #1c1d21; position: relative; }
    .master-meter-fill { height: 100%; background: var(--green); transition: width 0.05s; }
  </style>
</head>
<body>

<div class="app-container">
  
  <div id="audio-overlay" class="overlay-base"><button id="btn-enable-audio" style="padding:15px 30px; background:var(--green); border:none; border-radius:30px; font-weight:bold;">ENABLE AUDIO</button></div>
  
  <div id="login-overlay" class="overlay-base">
    <div class="modal-box">
      <button class="btn-close" id="btn-close-login">×</button>
      <input id="host-id" type="text" value="room-777" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333; text-align:center;">
      <div style="display:flex; gap:10px;">
        <button id="btn-host" style="flex:1; padding:12px; background:var(--blue); border:none; color:#fff; border-radius:8px;">HOST</button>
        <button id="btn-join" style="flex:1; padding:12px; background:var(--orange); border:none; color:#fff; border-radius:8px;">JOIN</button>
      </div>
      <div id="status-msg" style="font-size:11px; color:var(--text-sub); text-align:center;">Ready</div>
    </div>
  </div>

  <div id="io-overlay" class="overlay-base">
    <div class="modal-box">
      <button class="btn-close" id="btn-close-io">×</button>
      <h3 style="margin:0; color:var(--blue)">External I/O Matrix</h3>
      <button id="btn-refresh-devices" style="padding:5px; background:#333; color:#fff; border:none; margin:5px 0;">Refresh Devices</button>
      <div id="io-inputs-container"></div>
      <div id="io-outputs-container"></div>
    </div>
  </div>

  <div class="header">
    <div class="header-left">YY-Talk PRO</div>
    <div class="header-right">
      <button id="btn-show-io" class="btn-header">I/O</button>
      <button id="btn-show-login" class="btn-header">LOGIN</button>
    </div>
  </div>

  <div class="channel-list" id="channel-container"></div>

  <div class="master-meter"><div class="master-meter-fill" id="master-meter-fill"></div></div>
</div>

<script>
// ==========================================
// 改善4: ブラウザの拡大・縮小・右クリックを完全ブロック
// ==========================================
document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) { e.preventDefault(); } }, { passive: false });
let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) { 
  const now = (new Date()).getTime(); 
  if (now - lastTouchEnd <= 300) { e.preventDefault(); } lastTouchEnd = now; 
}, { passive: false });
window.addEventListener('contextmenu', e => { if(e.target.tagName !== 'INPUT') e.preventDefault(); });

// ==========================================
// アプリケーション・ステート
// ==========================================
const DEFAULT_CH_IDS = ['ch1','ch2','ch3','ch4','ch5'];
const CH_NAMES = { 'ch1':'TEST', 'ch2':'VE', 'ch3':'CA', 'ch4':'AUD', 'ch5':'WL-CAM' };

const state = {
  peer: null, localStream: null, peers: new Set(), dataConns: {}, mediaCalls: {},
  talkStates: {}, listenStates: {}, channelVolumes: {}, remoteTalkStates: {},
  isHost: false, audioEnabled: false,
  extInputs: Array.from({length:4}, (_,i)=>({ id:i, deviceId:'', chIdx:0, stream:null, splitter:null, gainNode:null, pls:{} })),
  extOutputs: Array.from({length:4}, (_,i)=>({ id:i, deviceId:'', chIdx:0, audioEl:new Audio(), destNode:null, pls:{} })),
  audioCtx: null, outgoingDest: null, micGain: null, masterAnalyser: null
};

// ==========================================
// 改善2: チャンネルUIと並び替えロジック
// ==========================================
const container = document.getElementById('channel-container');
const iconSpk = `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
const iconMic = `<svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>`;

// ローカルストレージから順番を読み込む
let savedOrder = JSON.parse(localStorage.getItem('yytalk-ch-order')) || DEFAULT_CH_IDS;
// 配列に不足があれば追加（新チャンネル追加時の対応）
DEFAULT_CH_IDS.forEach(id => { if(!savedOrder.includes(id)) savedOrder.push(id); });

function renderChannels() {
  container.innerHTML = '';
  savedOrder.forEach(id => {
    if(!DEFAULT_CH_IDS.includes(id)) return;
    
    // 初期化
    if(state.talkStates[id] === undefined) {
      state.talkStates[id] = false; state.listenStates[id] = false; state.channelVolumes[id] = 1.0;
    }

    const card = document.createElement('div'); 
    card.className = 'channel-card';
    card.id = `card-${id}`;
    card.innerHTML = `
      <div class="status-line"><div class="status-line-fill" id="meter-${id}"></div></div>
      <div class="main-controls">
        <button class="btn-action btn-listen" id="listen-${id}">${iconSpk}</button>
        <div class="ch-name">${CH_NAMES[id]} <span style="font-size:10px; color:#777;">PL</span></div>
        <button class="btn-action btn-talk" id="talk-${id}">${iconMic}</button>
      </div>
      <div class="volume-panel">
        <input type="range" id="vol-${id}" min="0" max="200" value="${state.channelVolumes[id]*100}" style="width:100%; accent-color:var(--orange);">
      </div>
      <div class="card-footer">
        <div class="btn-sort" onclick="moveChannel('${id}', -1)">▲</div>
        <div class="btn-expand" onclick="document.getElementById('card-${id}').classList.toggle('expanded')">● ● ●</div>
        <div class="btn-sort" onclick="moveChannel('${id}', 1)">▼</div>
      </div>
    `;
    container.appendChild(card);

    // ボリューム制御
    document.getElementById(`vol-${id}`).oninput = (e) => {
      state.channelVolumes[id] = e.target.value / 100;
      document.getElementById(`meter-${id}`).style.height = (e.target.value/2) + '%';
      updateAudioRouting();
    };

    // PTT制御
    setupPTT(document.getElementById(`listen-${id}`), 'listen', id);
    setupPTT(document.getElementById(`talk-${id}`), 'talk', id);
  });
}

// 順番を入れ替えて再描画＆保存
window.moveChannel = function(id, direction) {
  const idx = savedOrder.indexOf(id);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= savedOrder.length) return; // 範囲外ブロック
  
  // 配列の要素を入れ替え
  const temp = savedOrder[idx];
  savedOrder[idx] = savedOrder[newIdx];
  savedOrder[newIdx] = temp;
  
  localStorage.setItem('yytalk-ch-order', JSON.stringify(savedOrder));
  renderChannels(); // 再描画
}

renderChannels(); // 初回描画

// ==========================================
// I/O Matrix構築とオーディオエンジン (前回の最強機能継承)
// ==========================================
function buildIO() {
  ['in', 'out'].forEach(type => {
    const cont = document.getElementById(`io-${type === 'in' ? 'inputs' : 'outputs'}-container`);
    cont.innerHTML = `<div style="font-size:12px; color:var(--blue); margin-top:10px;">${type.toUpperCase()} PORTS (1-4)</div>`;
    for(let i=0; i<4; i++) {
      const row = document.createElement('div'); row.className = 'io-row';
      row.innerHTML = `<div class="io-header">
        <select class="io-select" id="sel-${type}-${i}"><option value="">-- No Device --</option></select>
        <input type="number" class="io-ch" id="idx-${type}-${i}" value="${i}" min="0" max="63">
      </div>
      <div class="io-checkboxes">${DEFAULT_CH_IDS.map(ch => `<label><input type="checkbox" data-type="${type}" data-idx="${i}" data-ch="${ch}">${CH_NAMES[ch]}</label>`).join('')}</div>`;
      cont.appendChild(row);
      
      const sel = row.querySelector('select');
      const idxInput = row.querySelector('input[type="number"]');
      
      sel.onchange = () => { const obj = type === 'in' ? state.extInputs[i] : state.extOutputs[i]; obj.deviceId = sel.value; updateExternalIO(type, i); };
      idxInput.onchange = () => { const obj = type === 'in' ? state.extInputs[i] : state.extOutputs[i]; obj.chIdx = parseInt(idxInput.value); updateExternalIO(type, i); };
      row.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.onchange = (e) => {
          const obj = type === 'in' ? state.extInputs[i] : state.extOutputs[i];
          obj.pls[e.target.dataset.ch] = e.target.checked;
          if(type === 'in') syncTalkStates();
          updateAudioRouting();
        };
      });
    }
  });
}
buildIO();

async function updateExternalIO(type, idx) {
  if(!state.audioCtx) return;
  const obj = type === 'in' ? state.extInputs[idx] : state.extOutputs[idx];
  if(!obj.deviceId) return;
  if(type === 'in') {
    try {
      if(obj.stream) obj.stream.getTracks().forEach(t=>t.stop());
      obj.stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId:{exact:obj.deviceId}, channelCount:64, echoCancellation:false, noiseSuppression:false }});
      const source = state.audioCtx.createMediaStreamSource(obj.stream);
      obj.splitter = state.audioCtx.createChannelSplitter(64);
      obj.gainNode = state.audioCtx.createGain();
      source.connect(obj.splitter);
      obj.splitter.connect(obj.gainNode, obj.chIdx); 
      obj.gainNode.connect(state.outgoingDest);
    } catch(e) { console.error(e); }
  } else {
    if(obj.destNode) return;
    obj.destNode = state.audioCtx.createMediaStreamDestination();
    obj.audioEl.srcObject = obj.destNode.stream;
    if(obj.audioEl.setSinkId) obj.audioEl.setSinkId(obj.deviceId);
    obj.audioEl.play();
  }
}

function initAudio(stream) {
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  state.outgoingDest = state.audioCtx.createMediaStreamDestination();
  state.masterAnalyser = state.audioCtx.createAnalyser();
  state.masterAnalyser.fftSize = 256;
  state.masterAnalyser.connect(state.audioCtx.destination);

  const micSource = state.audioCtx.createMediaStreamSource(stream);
  state.micGain = state.audioCtx.createGain();
  micSource.connect(state.micGain).connect(state.outgoingDest);

  const draw = () => {
    requestAnimationFrame(draw);
    const data = new Uint8Array(state.masterAnalyser.frequencyBinCount);
    state.masterAnalyser.getByteFrequencyData(data);
    const avg = data.reduce((a,b)=>a+b)/data.length;
    document.getElementById('master-meter-fill').style.width = Math.min(avg*1.5, 100) + '%';
  };
  draw();
}

function setupPeerMixer(call) {
  if(!state.audioCtx) return;
  const source = state.audioCtx.createMediaStreamSource(call.stream);
  const dummy = new Audio(); dummy.srcObject = call.stream; dummy.muted = true; dummy.play();

  call.nodes = { main: state.audioCtx.createGain(), exts: state.extOutputs.map(()=>state.audioCtx.createGain()) };
  source.connect(call.nodes.main).connect(state.masterAnalyser);
  state.extOutputs.forEach((out, i) => { if(out.destNode) source.connect(call.nodes.exts[i]).connect(out.destNode); });
  updateAudioRouting();
}

function updateAudioRouting() {
  if(!state.audioCtx) return;
  const anyTalk = Object.values(state.talkStates).some(v=>v);
  if(state.micGain) state.micGain.gain.value = anyTalk ? 1 : 0;

  Object.values(state.mediaCalls).forEach(call => {
    if(!call.nodes) return;
    const remoteTalk = state.remoteTalkStates[call.peer] || {};
    let mVol = 0;
    DEFAULT_CH_IDS.forEach(ch => { if(remoteTalk[ch] && state.listenStates[ch]) mVol = Math.max(mVol, state.channelVolumes[ch]); });
    call.nodes.main.gain.setTargetAtTime(mVol, state.audioCtx.currentTime, 0.05);

    state.extOutputs.forEach((out, i) => {
      let oVol = 0;
      DEFAULT_CH_IDS.forEach(ch => { if(remoteTalk[ch] && out.pls[ch]) oVol = 1; });
      call.nodes.exts[i].gain.setTargetAtTime(oVol, state.audioCtx.currentTime, 0.05);
    });
  });
}

// ==========================================
// PTT と通信関連
// ==========================================
function setupPTT(btn, type, ch) {
  if(!btn) return;
  let isDown = false, startX = 0, latched = false;
  const apply = (val) => {
    if(type==='talk') state.talkStates[ch] = val; else state.listenStates[ch] = val;
    btn.classList.toggle('active', val);
    updateAudioRouting(); if(type==='talk') syncTalkStates();
  };
  btn.onpointerdown = (e) => {
    btn.setPointerCapture(e.pointerId); isDown = true; startX = e.clientX;
    if(!latched) apply(true);
  };
  btn.onpointermove = (e) => {
    if(!isDown) return;
    const delta = e.clientX - startX;
    if(Math.abs(delta) > 30 && !latched) { latched = true; btn.style.borderWidth = '4px'; }
  };
  btn.onpointerup = (e) => {
    isDown = false;
    if(!latched) apply(false); else if(Math.abs(startX - e.clientX) < 5) {
       latched = false; btn.style.borderWidth = '1.5px'; apply(false);
    }
  };
}

const peerConfig = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: "turn:global.relay.metered.ca:80", username: "cce7732b3cc3adfa6f13a545", credential: "l3ACe3V84yTvkBEd" }] } };

// ★ 改善5: HOST時のパスワードロック
document.getElementById('btn-host').onclick = async () => {
  const pass = prompt("管理者パスワードを入力してください (ヒント: tmax)");
  if (pass !== "tmax") { alert("パスワードが違います。"); return; }

  state.localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
  initAudio(state.localStream);
  state.isHost = true;
  state.peer = new Peer(document.getElementById('host-id').value, peerConfig);
  state.peer.on('open', () => { document.getElementById('login-overlay').style.display='none'; });
  state.peer.on('connection', conn => setupData(conn));
  state.peer.on('call', call => { call.answer(state.outgoingDest.stream); handleMedia(call); });
};

document.getElementById('btn-join').onclick = async () => {
  state.localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
  initAudio(state.localStream);
  state.peer = new Peer(peerConfig);
  state.peer.on('open', id => {
    document.getElementById('login-overlay').style.display='none';
    setupData(state.peer.connect(document.getElementById('host-id').value));
    handleMedia(state.peer.call(document.getElementById('host-id').value, state.outgoingDest.stream));
  });
  state.peer.on('connection', conn => setupData(conn));
  state.peer.on('call', call => { call.answer(state.outgoingDest.stream); handleMedia(call); });
};

function setupData(conn) {
  state.dataConns[conn.peer] = conn;
  conn.on('data', data => { if(data.type==='update-talk-states') { state.remoteTalkStates[conn.peer] = data.states; updateAudioRouting(); } });
}

function handleMedia(call) {
  state.mediaCalls[call.peer] = call;
  call.on('stream', stream => { call.stream = stream; setupPeerMixer(call); });
}

function syncTalkStates() {
  let combined = {};
  DEFAULT_CH_IDS.forEach(ch => {
    combined[ch] = state.talkStates[ch];
    state.extInputs.forEach(input => { if(input.pls[ch]) combined[ch] = true; });
  });
  Object.values(state.dataConns).forEach(c => c.open && c.send({type:'update-talk-states', states: combined}));
}

document.getElementById('btn-show-login').onclick = () => document.getElementById('login-overlay').style.display='flex';
document.getElementById('btn-close-login').onclick = () => document.getElementById('login-overlay').style.display='none';
document.getElementById('btn-show-io').onclick = () => document.getElementById('io-overlay').style.display='flex';
document.getElementById('btn-close-io').onclick = () => document.getElementById('io-overlay').style.display='none';
document.getElementById('btn-enable-audio').onclick = () => { document.getElementById('audio-overlay').style.display='none'; if(state.audioCtx) state.audioCtx.resume(); };

document.getElementById('btn-refresh-devices').onclick = async () => {
  const devs = await navigator.mediaDevices.enumerateDevices();
  ['in', 'out'].forEach(type => {
    const list = devs.filter(d => d.kind === (type==='in'?'audioinput':'audiooutput'));
    for(let i=0; i<4; i++) {
      const sel = document.getElementById(`sel-${type}-${i}`);
      sel.innerHTML = '<option value="">-- None --</option>' + list.map(d => `<option value="${d.deviceId}">${d.label}</option>`).join('');
    }
  });
};
</script>
</body>
</html>
