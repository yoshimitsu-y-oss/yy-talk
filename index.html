<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>YY-Talk PRO - Ultimate Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    window.onerror = function(message, source, lineno) {
      if (typeof message === 'string' && message.includes("Cannot assign to read only property 'getUserMedia'")) return true;
      console.error("System Error: ", message, "Line:", lineno); return false;
    };
    function forceResize() {
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.height = h + 'px'; document.body.style.height = h + 'px';
      const container = document.getElementById('main-app-container');
      if (container) container.style.height = h + 'px';
      window.scrollTo(0, 0);
    }
    window.addEventListener('resize', forceResize);
  </script>

  <!-- LiveKit Stable Version -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.9/dist/livekit-client.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  
  <style>
    :root { --bg-dark: #0a0b0d; --card-bg: #1c1d21; --card-bg-expanded: #24262b; --text-main: #ffffff; --text-sub: #7a7e85; --green: #4ade80; --red: #dc2626; --alert: #ef4444; --orange: #f97316; --blue: #60a5fa; --border-color: #3a3c42; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    input, select { user-select: auto; touch-action: auto; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; overscroll-behavior: none; }
    .app-container { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; }
    .overlay-base { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); z-index: 1000; overflow-y: auto;}
    #login-overlay { z-index: 2000; display: flex; } #audio-overlay { z-index: 1100; }
    .btn-green-solid { background: var(--green); color: #000; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; }
    .login-modal { background: var(--card-bg); padding: 25px 20px; border-radius: 12px; width: 90%; max-width: 340px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .login-modal button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; color: #000; cursor: pointer; font-size: 15px; transition: 0.2s; width: 100%;}
    .btn-join-member { background: var(--blue); color: white!important; } .btn-join-admin { background: transparent; border: 1.5px solid var(--text-sub)!important; color: var(--text-sub)!important; }
    .login-input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: #0a0b0d; color: var(--text-main); font-size: 16px; text-align: center; font-family: 'JetBrains Mono', monospace; outline: none; }
    .login-input:focus { border-color: var(--blue); }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-dark); flex-shrink: 0; border-bottom: 1px solid var(--border-color); z-index: 100; }
    .room-info-group { display: flex; gap: 15px; align-items: center; }
    .room-info-label { font-size: 9px; color: var(--text-sub); }
    #header-room-name { font-size: 15px; font-weight: bold; font-family: 'JetBrains Mono', monospace;}
    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn-header-icon { background: transparent; border: 1.5px solid var(--text-sub); color: var(--text-sub); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;}
    .admin-only { display: none; }
    .admin-modal { width: 98%; max-width: 1100px; max-height: 95vh; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px;}
    .btn-close-modal { position: absolute; top: 10px; right: 15px; background: transparent; border: none; color: #7a7e85; font-size: 24px; cursor: pointer; }
    .admin-tabs-container { display: flex; gap: 8px; margin-bottom: 20px; }
    .admin-tab-btn { flex: 1; background: rgba(0,0,0,0.4); border: none; color: #555; padding: 12px; font-weight: bold; border-radius: 8px 8px 0 0; cursor: pointer; }
    .admin-tab-btn.active { background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; border-bottom: none;}
    .scroll-area { flex: 1; overflow-y: auto; }
    .admin-matrix-wrapper { width: 100%; overflow-x: auto; border-radius: 12px; background: #111216; border: 1px solid var(--border-color); margin-bottom: 15px;}
    .admin-matrix { width: 100%; border-collapse: separate; border-spacing: 0; min-width: max-content; text-align: center; font-size: 13px; }
    .admin-matrix th, .admin-matrix td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 8px; }
    .admin-matrix th { color: var(--text-sub); position: sticky; top: 0; z-index: 5; background: #1c1d21; }
    .admin-matrix td.ch-cell { text-align: left; background-color: #0a0b0d; position: sticky; left: 0; z-index: 9; }
    .matrix-toggle { width: 36px; height: 24px; background: #111; border: 1px solid #000; border-radius: 3px; cursor: pointer; margin: 0 auto; transition: 0.2s;}
    .matrix-toggle.active { background: var(--green); }
    .global-controls { display: flex; gap: 10px; padding: 10px 15px; background: var(--bg-dark); border-bottom: 2px solid var(--green); flex-shrink: 0; }
    .btn-global { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; border: 1px solid var(--border-color); background: #1c1d21; color: var(--text-main); }
    .btn-global.active.btn-master-spk { background: var(--green); color: #000; }
    .btn-global.active.btn-master-mic { background: var(--red); color: #000; }
    .channel-list-container { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr)); gap: 15px; align-content: start; }
    .channel-card { background: var(--card-bg); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; border: 1px solid var(--border-color);}
    .channel-card.listen-on { border-color: var(--green); } .channel-card.talk-on { border-color: var(--red); }
    .main-controls { display: flex; align-items: center; justify-content: space-between; padding: 15px; z-index: 1;}
    .ch-info { text-align: center; flex: 1; } .ch-name { font-size: 16px; font-weight: bold; }
    .btn-action { width: 55px; height: 55px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; background: #1c1d21; cursor: pointer; font-size: 20px;}
    .btn-listen { border-color: var(--green); color: var(--green); } .btn-listen.latched { background: var(--green); color: #000; }
    .btn-talk { border-color: var(--red); color: var(--red); } .btn-talk.latched { background: var(--red); color: #fff; }
    .volume-panel { padding: 10px 15px; display: flex; align-items: center; gap: 10px; background: #111;}
    input[type=range] { flex: 1; accent-color: var(--orange); }
    .master-meter-container { height: 8px; width: 100%; background: #000; position: relative; flex-shrink: 0;}
    .master-meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4ade80, #eab308, #ef4444); transition: width 0.05s ease-out; }
    .ch-meter-container { height: 4px; background: #000; width: 100%; }
    .ch-meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4ade80, #eab308, #ef4444); }
  </style>
</head>
<body onload="forceResize()">

  <div class="app-container" id="main-app-container">
    
    <div id="audio-overlay" class="overlay-base">
        <p style="font-weight:bold;margin-bottom:20px;font-size:18px;">通話に参加しますか？</p>
        <button id="btn-enable-audio" class="btn-green-solid">音声を有効にして参加</button>
    </div>

    <!-- ログイン画面 -->
    <div id="login-overlay" class="overlay-base">
      <div class="login-modal">
        <div style="text-align: center; margin-bottom: 20px;">
          <h2 style="font-family:'JetBrains Mono'; margin:0; font-size: 28px; color: var(--blue);">YY-Talk</h2>
          <p style="font-size: 12px; color: var(--text-sub); margin-top: 5px;">PRO Ultimate Edition</p>
        </div>
        <input type="text" id="host-id" class="login-input" placeholder="ROOM NAME (例: STUDIO_A)">
        <input type="text" id="join-userid" class="login-input" placeholder="USER ID (例: CAM1)">
        <button id="btn-join-member" class="btn-join-member">接続 (Connect)</button>
        <button id="btn-join-admin" class="btn-join-admin">管理者接続 (Admin)</button>
        <div class="status-text" id="status-msg">待機中... ルーム名とIDを入力</div>
      </div>
    </div>

    <!-- 管理者パネル -->
    <div id="admin-overlay" class="overlay-base">
      <div class="admin-modal">
        <button id="btn-close-admin" class="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
        <div class="admin-tabs-container">
          <button class="admin-tab-btn active"><i class="fa-solid fa-network-wired"></i> PATCH PANEL</button>
        </div>
        <div class="scroll-area">
          <div id="admin-matrix-container"></div>
          <button id="btn-add-ch" style="background: rgba(96, 165, 250, 0.1); color: var(--blue); border: 1px solid rgba(96, 165, 250, 0.4); width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;">＋ 新規パーティーを追加</button>
        </div>
      </div>
    </div>

    <div class="header">
      <div class="room-info-group">
          <div><div class="room-info-label">ROOM NAME</div><div id="header-room-name">---</div></div>
          <div><div class="room-info-label">USER ID</div><div id="header-user-id" style="font-weight:bold; font-size:15px;">---</div></div>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="btn-header-icon admin-only"><i class="fa-solid fa-gear"></i></button>
        <button id="btn-logout" class="btn-header-icon" style="color:var(--red); border-color:var(--red);"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>

    <div class="global-controls">
      <button id="btn-master-spk" class="btn-global btn-master-spk"><i class="fa-solid fa-volume-high"></i> SPK MUTE</button>
      <button id="btn-master-mic" class="btn-global btn-master-mic"><i class="fa-solid fa-microphone"></i> MIC MUTE</button>
    </div>

    <div class="channel-list-container" id="channel-list-wrap"></div>
    <div class="master-meter-container"><div class="master-meter-fill" id="master-meter-fill"></div></div>
  </div>

  <script>
    // ----------------------------------------------------
    // ★ コア・ステート & ユーティリティ
    // ----------------------------------------------------
    const WORKER_AUTH_URL = "https://yy-talk.yoshimitsu-y.workers.dev";
    
    const safeStorage = { 
        get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } }, 
        set: (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} }, 
        remove: (key) => { try { localStorage.removeItem(key); } catch(e) {} } 
    };

    let state = {
      room: null,
      roomId: '', myUserId: '', isAdmin: false,
      registeredUsers: [], userAssignments: {},
      channels: [],
      talkStates: {}, listenStates: {}, channelVolumes: {},
      remoteTalkStates: {}, remoteListenStates: {},
      isMasterSpkMuted: false, isMasterMicMuted: false,
      audioCtx: null, localStream: null, masterAnalyser: null, localMicAnalyser: null,
      channelNodes: {}, mediaCalls: {}
    };

    const els = {
      loginOverlay: document.getElementById('login-overlay'), audioOverlay: document.getElementById('audio-overlay'), adminOverlay: document.getElementById('admin-overlay'),
      hostInput: document.getElementById('host-id'), userInput: document.getElementById('join-userid'),
      btnJoinMem: document.getElementById('btn-join-member'), btnJoinAdm: document.getElementById('btn-join-admin'), btnStop: document.getElementById('btn-logout'),
      roomName: document.getElementById('header-room-name'), userId: document.getElementById('header-user-id'),
      chWrap: document.getElementById('channel-list-wrap'), matrixWrap: document.getElementById('admin-matrix-container'),
      btnMasterSpk: document.getElementById('btn-master-spk'), btnMasterMic: document.getElementById('btn-master-mic'),
      btnSettings: document.getElementById('btn-settings'), btnCloseAdmin: document.getElementById('btn-close-admin'), btnAddCh: document.getElementById('btn-add-ch'),
      masterMeter: document.getElementById('master-meter-fill')
    };

    // 初期化ロード
    try { const p = JSON.parse(safeStorage.get('yytalk_profile')); if(p) { els.hostInput.value = p.room||''; els.userInput.value = p.user||''; } } catch(e){}

    // ----------------------------------------------------
    // ★ 部屋データの保存・ロード（バグを排除した一本道）
    // ----------------------------------------------------
    function saveRoomState() {
        if(!state.roomId) return;
        const data = { channels: state.channels, userAssignments: state.userAssignments, registeredUsers: state.registeredUsers };
        safeStorage.set('yytalk_room_' + state.roomId, JSON.stringify(data));
    }

    function loadAndInitRoomData() {
        // 1. 過去データのロード
        const saved = safeStorage.get('yytalk_room_' + state.roomId);
        if (saved) {
            try {
                const p = JSON.parse(saved);
                if (p.channels && p.channels.length > 0) {
                    state.channels = p.channels;
                    state.userAssignments = p.userAssignments || {};
                    state.registeredUsers = p.registeredUsers || Object.keys(state.userAssignments);
                }
            } catch(e){}
        }
        // デフォルト値のセット（データが空の場合）
        if (state.channels.length === 0) {
            state.channels = [ { id: 'ch-video', name: 'ALL', type: 'Listen', fixed: true }, { id: 'ch1', name: 'PL 1', type: 'PL' } ];
            state.userAssignments = {}; state.registeredUsers = [];
        }

        // 2. 自分自身を確実に登録
        if (!state.registeredUsers.includes(state.myUserId)) {
            state.registeredUsers.push(state.myUserId);
            state.userAssignments[state.myUserId] = state.channels.map(c => c.id);
        }

        // 3. 状態のセーブとUIへの反映
        saveRoomState();
        applyAssignments(state.userAssignments[state.myUserId]);
        if (state.isAdmin) buildAdminMatrix();
    }

    // ----------------------------------------------------
    // ★ オーディオ & PTT ルーティング（原点回帰のソフトウェアミキサー）
    // ----------------------------------------------------
    function initAudioSystem() {
        if (state.audioCtx) return;
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        state.masterAnalyser = state.audioCtx.createAnalyser();
        state.masterAnalyser.fftSize = 256;
        
        const dest = state.audioCtx.createMediaStreamDestination();
        state.masterAnalyser.connect(dest);
        const audioEl = new Audio(); audioEl.srcObject = dest.stream; audioEl.play().catch(()=>{});

        // 自分のマイクをメーター用アナライザーに接続
        if (state.localStream) {
            const src = state.audioCtx.createMediaStreamSource(state.localStream);
            state.localMicAnalyser = state.audioCtx.createAnalyser();
            state.localMicAnalyser.fftSize = 256;
            src.connect(state.localMicAnalyser);
        }

        state.channels.forEach(ch => setupChannelAudioNode(ch.id));
        startMeterDraw();
    }

    function setupChannelAudioNode(chId) {
        if (!state.audioCtx || state.channelNodes[chId]) return;
        const analyser = state.audioCtx.createAnalyser(); analyser.fftSize = 256;
        const masterGain = state.audioCtx.createGain(); masterGain.gain.value = 0;
        analyser.connect(masterGain); masterGain.connect(state.masterAnalyser);
        state.channelNodes[chId] = { analyser, masterGain };
    }

    function setupPeerMixer(peerId, stream) {
        if(!state.audioCtx || !stream) return;
        const src = state.audioCtx.createMediaStreamSource(stream);
        const analyser = state.audioCtx.createAnalyser(); analyser.fftSize = 256;
        src.connect(analyser);

        const chGains = {};
        state.channels.forEach(ch => {
            const splitGain = state.audioCtx.createGain(); splitGain.gain.value = 0;
            src.connect(splitGain);
            if(state.channelNodes[ch.id]) splitGain.connect(state.channelNodes[ch.id].analyser);
            chGains[ch.id] = splitGain;
        });

        state.mediaCalls[peerId] = { stream, analyser, chGains };
        updateAudioRouting();
    }

    // ★ 相手の音声を各チャンネルのGainで絞る（ミュート制御のコア）
    function updateAudioRouting() {
        if (!state.audioCtx) return;
        
        // 自分のチャンネルマスターボリューム
        state.channels.forEach(ch => {
            if (state.channelNodes[ch.id]) {
                const vol = (state.listenStates[ch.id] && !state.isMasterSpkMuted) ? (state.channelVolumes[ch.id] || 1.0) : 0;
                state.channelNodes[ch.id].masterGain.gain.setTargetAtTime(vol, state.audioCtx.currentTime, 0.05);
            }
        });

        // 相手からの音声を振り分け
        for (const peerId in state.mediaCalls) {
            const call = state.mediaCalls[peerId];
            const peerTalks = state.remoteTalkStates[peerId] || {};
            
            state.channels.forEach(ch => {
                if (call.chGains && call.chGains[ch.id]) {
                    const isTalking = peerTalks[ch.id] === true;
                    // ListenがON、かつ相手がそのチャンネルでTalkしている場合のみ音を出す
                    const vol = (isTalking && state.listenStates[ch.id] && !state.isMasterSpkMuted) ? 1 : 0;
                    call.chGains[ch.id].gain.setTargetAtTime(vol, state.audioCtx.currentTime, 0.05);
                }
            });
        }
    }

    function syncTalkStates() { 
        sendData({ type: 'update-talk-states', states: state.talkStates }); 
        
        // LiveKit側のマイクは、自分がどこかのチャンネルでTalkしている時だけONにする
        const isAnyTalking = Object.values(state.talkStates).some(v => v === true) && !state.isMasterMicMuted;
        if(state.room && state.room.localParticipant) {
             state.room.localParticipant.setMicrophoneEnabled(isAnyTalking).catch(()=>{});
        }
    }

    // ----------------------------------------------------
    // ★ UI 構築とイベントハンドリング
    // ----------------------------------------------------
    function applyAssignments(assignedIds) {
        if(!assignedIds) return;
        els.chWrap.innerHTML = '';
        state.channels.forEach(ch => {
            setupChannelAudioNode(ch.id);
            if(state.listenStates[ch.id] === undefined) state.listenStates[ch.id] = false;
            if(state.talkStates[ch.id] === undefined) state.talkStates[ch.id] = false;
            if(state.channelVolumes[ch.id] === undefined) state.channelVolumes[ch.id] = 1.0;

            if (assignedIds.includes(ch.id)) {
                const card = document.createElement('div'); card.className = 'channel-card'; card.id = `card-${ch.id}`;
                if(state.listenStates[ch.id]) card.classList.add('listen-on');
                if(state.talkStates[ch.id]) card.classList.add('talk-on');

                card.innerHTML = `
                    <div class="main-controls">
                        <button class="btn-action btn-listen ${state.listenStates[ch.id] ? 'latched' : ''}" id="listen-${ch.id}"><i class="fa-solid fa-volume-high"></i></button>
                        <div class="ch-info"><div class="ch-name">${ch.name}</div><div class="ch-type">${ch.type}</div></div>
                        ${ch.type === 'Listen' ? '<div style="width:55px;"></div>' : `<button class="btn-action btn-talk ${state.talkStates[ch.id] ? 'latched' : ''}" id="talk-${ch.id}"><i class="fa-solid fa-microphone"></i></button>`}
                    </div>
                    <div class="ch-meter-container"><div class="ch-meter-fill" id="meter-${ch.id}"></div></div>
                    <div class="volume-panel"><i class="fa-solid fa-volume-low"></i><input type="range" id="vol-${ch.id}" min="0" max="200" value="${state.channelVolumes[ch.id]*100}"><i class="fa-solid fa-volume-high"></i></div>
                `;
                els.chWrap.appendChild(card);

                // Vol Slider
                card.querySelector(`#vol-${ch.id}`).addEventListener('input', (e) => { state.channelVolumes[ch.id] = e.target.value / 100; updateAudioRouting(); });

                // PTT Logic
                const setupPTT = (btnId, type) => {
                    const btn = card.querySelector(`#${btnId}`); if(!btn) return;
                    let isDown = false, startY = 0, isLatched = btn.classList.contains('latched');
                    const apply = (active) => {
                        if(type==='listen') { state.listenStates[ch.id] = active; active ? card.classList.add('listen-on') : card.classList.remove('listen-on'); syncListenStates(); }
                        if(type==='talk') { state.talkStates[ch.id] = active; active ? card.classList.add('talk-on') : card.classList.remove('talk-on'); syncTalkStates(); }
                        updateAudioRouting();
                    };
                    btn.onpointerdown = (e) => { btn.setPointerCapture(e.pointerId); isDown=true; startY=e.clientY; if(!isLatched) { btn.classList.add('latched'); apply(true); } };
                    btn.onpointermove = (e) => { if(!isDown) return; let dy = e.clientY - startY; if(dy > 50) { isDown=false; isLatched=false; btn.classList.remove('latched'); btn.style.transform=''; apply(false); } else if(dy < -50) { isDown=false; isLatched=true; btn.classList.add('latched'); btn.style.transform=''; apply(true); } else { btn.style.transform=`translateY(${dy}px)`; }};
                    btn.onpointerup = btn.onpointercancel = (e) => { if(!isDown) return; isDown=false; btn.style.transform=''; if(Math.abs(e.clientY - startY) < 10) { isLatched = !isLatched; isLatched ? btn.classList.add('latched') : btn.classList.remove('latched'); apply(isLatched); } else { if(!isLatched){ btn.classList.remove('latched'); apply(false); } } };
                };
                setupPTT(`listen-${ch.id}`, 'listen'); setupPTT(`talk-${ch.id}`, 'talk');
            }
        });
        updateAudioRouting();
    }

    function buildAdminMatrix() {
        if(!state.isAdmin) return;
        let head = `<tr><th>USER</th>`;
        state.channels.forEach(ch => { head += `<th>${ch.name}</th>`; });
        head += `</tr>`;
        
        let body = '';
        state.registeredUsers.forEach(uid => {
            const isOnline = uid === state.myUserId || (state.room && state.room.remoteParticipants && state.room.remoteParticipants.has(uid));
            const cColor = isOnline ? 'var(--green)' : 'var(--text-sub)';
            let row = `<tr><td><span style="color:${cColor}">●</span> ${uid}</td>`;
            state.channels.forEach(ch => {
                const assigned = (state.userAssignments[uid]||[]).includes(ch.id);
                row += `<td><div class="matrix-toggle ${assigned?'active':''}" onclick="toggleAssign('${uid}','${ch.id}')"></div></td>`;
            });
            body += `${row}</tr>`;
        });
        els.matrixWrap.innerHTML = `<table class="admin-matrix"><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    window.toggleAssign = function(uid, chid) {
        let arr = state.userAssignments[uid] || [];
        if(arr.includes(chid)) arr = arr.filter(id => id !== chid); else arr.push(chid);
        state.userAssignments[uid] = arr;
        saveRoomState(); buildAdminMatrix();
        sendData({ type: 'assign-update', assignments: state.userAssignments });
        if(uid === state.myUserId) applyAssignments(arr);
    };

    els.btnAddCh.onclick = () => {
        const name = prompt("新規パーティー名を入力"); if(!name) return;
        const newCh = { id: 'ch'+Date.now(), name: name, type: 'PL' };
        state.channels.push(newCh);
        state.registeredUsers.forEach(u => state.userAssignments[u].push(newCh.id));
        saveRoomState(); buildAdminMatrix(); applyAssignments(state.userAssignments[state.myUserId]);
        sendData({ type: 'channel-update', channels: state.channels, assignments: state.userAssignments });
    };

    // マスターミュート
    els.btnMasterSpk.onclick = () => { state.isMasterSpkMuted = !state.isMasterSpkMuted; els.btnMasterSpk.classList.toggle('active', state.isMasterSpkMuted); updateAudioRouting(); };
    els.btnMasterMic.onclick = () => { state.isMasterMicMuted = !state.isMasterMicMuted; els.btnMasterMic.classList.toggle('active', state.isMasterMicMuted); syncTalkStates(); };

    // ----------------------------------------------------
    // ★ ネットワーク・通信処理（LiveKit）
    // ----------------------------------------------------
    async function sendData(payload) {
        if(!state.room || !state.room.localParticipant) return;
        try {
            const data = new TextEncoder().encode(JSON.stringify(payload));
            // フェイルセーフ：最新版と旧版の互換性を取る
            if(typeof LivekitClient.DataPacket_Kind !== 'undefined' && LivekitClient.DataPacket_Kind.RELIABLE !== undefined){
                await state.room.localParticipant.publishData(data, LivekitClient.DataPacket_Kind.RELIABLE);
            } else {
                await state.room.localParticipant.publishData(data, { reliable: true });
            }
        } catch(e) { console.warn("Data Send Fallback", e); }
    }

    function handleNetworkData(payloadStr, senderId) {
        try {
            const data = JSON.parse(payloadStr);
            if(data.type === 'hello') {
                if(!state.registeredUsers.includes(senderId)) { state.registeredUsers.push(senderId); state.userAssignments[senderId] = state.channels.map(c=>c.id); saveRoomState(); }
                if(state.isAdmin) { buildAdminMatrix(); sendData({ type: 'init-state', channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers }); }
            }
            if(data.type === 'init-state' || data.type === 'channel-update') {
                state.channels = data.channels; state.userAssignments = data.assignments; state.registeredUsers = data.registered || state.registeredUsers;
                saveRoomState(); applyAssignments(state.userAssignments[state.myUserId]); if(state.isAdmin) buildAdminMatrix();
            }
            if(data.type === 'assign-update') {
                state.userAssignments = data.assignments; saveRoomState();
                applyAssignments(state.userAssignments[state.myUserId]); if(state.isAdmin) buildAdminMatrix();
            }
            if(data.type === 'update-talk-states') { state.remoteTalkStates[senderId] = data.states; updateAudioRouting(); }
            if(data.type === 'update-listen-states') { state.remoteListenStates[senderId] = data.states; updateAudioRouting(); }
        } catch(e){}
    }

    // ----------------------------------------------------
    // ★ 接続と起動シーケンス
    // ----------------------------------------------------
    async function joinNetwork(isAdmin) {
        const roomName = els.hostInput.value.trim(); const userName = els.userInput.value.trim();
        if(!roomName || !userName) { alert("入力が不足しています"); return; }
        
        state.roomId = roomName; state.myUserId = userName; state.isAdmin = isAdmin;
        safeStorage.set('yytalk_profile', JSON.stringify({room: roomName, user: userName}));
        
        els.loginOverlay.style.display = 'none';
        els.roomName.textContent = roomName; els.userId.textContent = userName;
        if(isAdmin) document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'flex');

        // ★事前のデータロードと自己アサイン（ここでUI描画準備完了）
        loadAndInitRoomData();
        els.audioOverlay.style.display = 'flex';

        // マイクの取得（メーター用＆LiveKit配信用）
        try { state.localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } }); } catch(e) { console.warn("Mic err", e); }

        try {
            const res = await fetch(`${WORKER_AUTH_URL}/?room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(userName)}`);
            if(!res.ok) throw new Error("Auth Server Error");
            const token = (await res.json()).token;

            state.room = new LivekitClient.Room({ adaptiveStream: false, dynacast: false });
            
            state.room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
                if(track.kind === 'audio') {
                    const stream = new MediaStream([track.mediaStreamTrack]);
                    const audioEl = new Audio(); audioEl.srcObject = stream; audioEl.muted = true; audioEl.play().catch(()=>{});
                    setupPeerMixer(participant.identity, stream);
                    if(state.isAdmin) buildAdminMatrix();
                }
            });
            state.room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
                if(track.kind === 'audio') { delete state.mediaCalls[participant.identity]; updateAudioRouting(); }
            });
            state.room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant) => {
                const str = new TextDecoder().decode(payload);
                handleNetworkData(str, participant?.identity);
            });
            state.room.on(LivekitClient.RoomEvent.ParticipantConnected, () => { if(state.isAdmin) buildAdminMatrix(); sendData({ type:'hello', userId: state.myUserId }); syncTalkStates(); syncListenStates(); });
            state.room.on(LivekitClient.RoomEvent.ParticipantDisconnected, (p) => { delete state.mediaCalls[p.identity]; if(state.isAdmin) buildAdminMatrix(); });

            await state.room.connect(LIVEKIT_WS_URL, token);
            sendData({ type:'hello', userId: state.myUserId });

        } catch(e) {
            alert("接続エラー: " + e.message);
        }
    }

    els.btnJoinMem.onclick = () => joinNetwork(false);
    els.btnJoinAdm.onclick = () => joinNetwork(true);
    els.btnStop.onclick = () => location.reload();
    
    // ユーザーアクションによるオーディオシステム起動
    document.getElementById('btn-enable-audio').onclick = () => {
        els.audioOverlay.style.display = 'none';
        initAudioContext();
    };

    els.btnSettings.onclick = () => els.adminOverlay.style.display = 'flex';
    els.btnCloseAdmin.onclick = () => els.adminOverlay.style.display = 'none';

    // メーター描画ループ
    function startMeterDraw() {
        function draw() {
            requestAnimationFrame(draw);
            if(!state.masterAnalyser) return;
            
            // 自分のマイク入力レベル
            let localLevel = 0;
            if(state.localMicAnalyser) {
                const data = new Uint8Array(state.localMicAnalyser.frequencyBinCount);
                state.localMicAnalyser.getByteFrequencyData(data);
                let sum = 0; for(let i=0; i<data.length; i++) sum+=data[i];
                localLevel = (sum / data.length) / 255;
            }

            // 各チャンネルのメーター描画
            state.channels.forEach(ch => {
                const el = document.getElementById(`meter-${ch.id}`); if(!el) return;
                let maxLevel = 0;
                if(state.talkStates[ch.id]) maxLevel = localLevel; // 自分が話している時
                for(let pid in state.mediaCalls) {
                    if(state.remoteTalkStates[pid] && state.remoteTalkStates[pid][ch.id]) {
                        const call = state.mediaCalls[pid];
                        if(call.analyser) {
                            const d = new Uint8Array(call.analyser.frequencyBinCount);
                            call.analyser.getByteFrequencyData(d);
                            let s = 0; for(let i=0; i<d.length; i++) s+=d[i];
                            const lvl = (s / d.length) / 255;
                            if(lvl > maxLevel) maxLevel = lvl;
                        }
                    }
                }
                el.style.width = Math.min(maxLevel * 200, 100) + '%';
            });
        }
        draw();
    }
  </script>
