<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>YY-Talk PRO - I/O Bridge Edition</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.1.2/dist/livekit-client.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  
  <style>
    :root {
      --bg-dark: #0a0b0d; --card-bg: #1c1d21; --card-bg-expanded: #24262b;
      --text-main: #ffffff; --text-sub: #7a7e85;
      --green: #4ade80; --red: #dc2626; --alert: #ef4444;
      --orange: #f97316; --blue: #3b82f6; --border-color: #3a3c42;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121418; color: var(--text-main); font-family: -apple-system, sans-serif; overscroll-behavior: none; }
    .app-container { width: 100%; height: 100dvh; background-color: var(--bg-dark); display: flex; flex-direction: column; position: relative; padding-top: env(safe-area-inset-top); }
    
    /* Overlay & Modals */
    .overlay-base { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); z-index: 1000; }
    .login-modal { background: var(--card-bg); padding: 25px; border-radius: 12px; width: 90%; max-width: 340px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; }
    .login-modal input, .login-modal select { width: 100%; padding: 12px; background: #0a0b0d; border: 1px solid var(--border-color); color: #fff; border-radius: 8px; font-size: 16px; text-align: center;}
    .btn-join-member { background: var(--orange); color: #000; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-join-admin { background: transparent; border: 1.5px solid var(--blue); color: var(--blue); padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

    /* Admin Panel */
    .admin-modal { width: 95%; max-width: 1200px; height: 90vh; background: var(--card-bg); border-radius: 12px; display: flex; flex-direction: column; padding: 20px; border: 1px solid var(--border-color); position: relative; }
    .admin-tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; }
    .admin-tabs button { flex: 1; background: transparent; border: none; color: var(--text-sub); padding: 12px; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; }
    .admin-tabs button.active { color: var(--blue); border-bottom: 2px solid var(--blue); }
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }

    /* Matrix & I/O Settings */
    .admin-matrix-wrapper { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
    .admin-matrix { width: 100%; border-collapse: collapse; min-width: 800px; text-align: center; }
    .admin-matrix th, .admin-matrix td { border: 1px solid var(--border-color); padding: 10px; font-size: 13px; }
    .admin-matrix select { background: #0a0b0d; color: #fff; border: 1px solid var(--border-color); border-radius: 4px; padding: 4px; font-family: 'JetBrains Mono', monospace; }
    
    .io-setting-row { display: flex; gap: 20px; background: #0a0b0d; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-color); align-items: center; justify-content: center; flex-wrap: wrap;}
    .io-label { font-size: 12px; color: var(--text-sub); font-weight: bold; display: block; margin-bottom: 5px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; flex-shrink: 0; border-bottom: 1px solid var(--border-color); }
    #app-logo { height: 26px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-header-icon { background: transparent; border: 1.5px solid var(--text-sub); color: var(--text-sub); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-header-icon.active { border-color: var(--green); color: var(--green); background: rgba(74, 222, 128, 0.1); }

    /* Channel List */
    .channel-list-container { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 600px) { .channel-list-container { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); } }
    .channel-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); position: relative; }
    .channel-card.listen-on { border-left: 6px solid var(--green); }
    .channel-card.talk-on { border-right: 6px solid var(--red); }
    
    .main-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .ch-info { text-align: center; flex: 1; }
    .ch-name { font-size: 16px; font-weight: bold; }
    .ch-type-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: #000; padding: 2px 6px; border-radius: 4px; color: var(--text-sub); }
    
    .btn-action { width: 54px; height: 54px; border-radius: 50%; border: 2.5px solid; display: flex; align-items: center; justify-content: center; background: #1c1d21; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
    .btn-listen { border-color: var(--green); } .btn-listen.active { background: var(--green); color: #000; box-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }
    .btn-talk { border-color: var(--red); } .btn-talk.active { background: var(--red); color: #fff; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
    .btn-talk.disabled { opacity: 0.1; cursor: not-allowed; pointer-events: none; }
    
    .ch-meter-container { height: 4px; background: #000; margin-top: 10px; border-radius: 2px; overflow: hidden; position: relative; }
    .ch-meter-fill { position: absolute; right: 0; top: 0; bottom: 0; width: 100%; background: #000; transition: width 0.05s linear; }
    .ch-meter-grad { height: 100%; background: linear-gradient(90deg, var(--green) 0%, var(--orange) 70%, var(--red) 100%); }

    /* Global Meters */
    .master-meter-container { height: 6px; width: 100%; background: #000; position: relative; }
    .master-meter-fill { position: absolute; right: 0; top: 0; bottom: 0; width: 100%; background: #000; }
    .master-meter-grad { height: 100%; background: linear-gradient(90deg, var(--green), var(--orange), var(--red)); }

    /* Matrix Styles */
    .matrix-toggle { width: 32px; height: 32px; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'JetBrains Mono'; font-weight: bold; background: #0a0b0d; color: #444; }
    .matrix-toggle.active { background: var(--green); color: #000; border-color: var(--green); }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="login-overlay" class="overlay-base" style="display: flex;">
      <div class="login-modal">
        <h3 style="text-align: center; margin: 0;">YY-Talk Bridge Edition</h3>
        <input id="host-id" type="text" placeholder="ルーム名 (yytalk)" value="yytalk">
        <input id="join-userid" type="text" placeholder="ユーザーID (例: Admin1)">
        <button class="btn-join-member" id="btn-join-member">メンバーとして接続</button>
        <button class="btn-join-admin" id="btn-join-admin">管理者として接続</button>
        <div id="status-msg" style="font-size: 12px; color: var(--text-sub); text-align: center;">サーバー接続待機中...</div>
      </div>
    </div>

    <div id="admin-overlay" class="overlay-base">
      <div class="admin-modal">
        <button id="btn-close-admin" style="position: absolute; top: 15px; right: 20px; background:transparent; border:none; color:#fff; font-size:24px; cursor:pointer;">×</button>
        <div class="admin-tabs">
          <button id="tab-patch" class="active">PATCH PANEL</button>
          <button id="tab-io">I/O BRIDGE</button>
        </div>
        <div class="scroll-area">
          <div id="sec-patch">
            <div id="admin-matrix-container"></div>
            <button id="btn-add-ch" style="width:100%; padding:12px; margin-top:15px; background:transparent; border:1px solid var(--green); color:var(--green); border-radius:8px; font-weight:bold; cursor:pointer;">＋ 新規パーティーを追加</button>
          </div>
          <div id="sec-io" style="display: none;">
            <div class="io-setting-row">
              <div style="flex: 1; min-width: 200px;">
                <label class="io-label">I/O BRIDGE MODE</label>
                <button id="btn-io-toggle" style="width:100%; padding:10px; border-radius:8px; border:none; background:var(--card-bg); color:#fff; font-weight:bold; cursor:pointer; border:1px solid var(--border-color);">OFF</button>
              </div>
              <div style="flex: 1; min-width: 200px;">
                <label class="io-label">OUTPUT DEVICE (USB I/F)</label>
                <select id="select-output-device" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; border:1px solid var(--border-color);"></select>
              </div>
            </div>
            <div class="io-setting-row">
              <div style="flex: 1;">
                <label class="io-label">OUT 1 (LEFT) ASSIGN</label>
                <select id="select-io-left" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--blue); border-radius:8px;"></select>
              </div>
              <div style="flex: 1;">
                <label class="io-label">OUT 2 (RIGHT) ASSIGN</label>
                <select id="select-io-right" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--red); border-radius:8px;"></select>
              </div>
            </div>
            <p style="font-size: 11px; color: var(--text-sub); text-align: center;">※ブリッジモードをONにすると、マイク処理（エコー除去等）が無効化され、高音質なライン入力モードになります。</p>
          </div>
        </div>
      </div>
    </div>

    <div class="header">
      <svg id="app-logo" viewBox="0 0 200 60"><path d="M 12 30 L 20 42 L 20 54 M 28 30 L 20 42" stroke="var(--blue)" stroke-width="5" fill="none" /><path d="M 42 30 L 50 42 L 50 54 M 58 30 L 50 42" stroke="var(--green)" stroke-width="5" fill="none" /><text x="75" y="44" font-family="sans-serif" font-weight="900" font-size="34" fill="#fff">Talk</text></svg>
      <div class="header-right">
        <button id="btn-settings" class="btn-header-icon" style="display: none;"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
        <div id="btn-status" class="btn-join-member" style="padding: 6px 12px; font-size: 12px;">Login</div>
      </div>
    </div>

    <div class="channel-list-container" id="channel-list-wrap"></div>

    <div class="master-meter-container">
      <div class="master-meter-grad"></div>
      <div class="master-meter-fill" id="master-meter-fill"></div>
    </div>
  </div>

  <script>
    // --- STATE ---
    const state = {
      room: null, roomId: '', myUserId: '', isAdmin: false,
      channels: [], registeredUsers: [], userAssignments: {},
      listenStates: {}, talkStates: {}, remoteTalkStates: {}, remoteListenStates: {},
      ioBridge: { enabled: false, deviceId: '', leftCh: '', rightCh: '' },
      audioCtx: null, masterAnalyser: null, channelNodes: {}, mediaCalls: {}
    };

    // --- CONSTANTS ---
    const LIVEKIT_WS_URL = "wss://yy-talk-pe8z9ycq.livekit.cloud";
    const WORKER_AUTH_URL = "https://yy-talk.yoshimitsu-y.workers.dev";
    const MQTT_WS_URL = "wss://20bd5d3aabd84b13995fccc5a186dc28.s1.eu.hivemq.cloud:8884/mqtt";
    const MQTT_USER = "yytalk";
    const MQTT_PASS = "Yytalk415";

    const els = {
      loginOverlay: document.getElementById('login-overlay'),
      hostId: document.getElementById('host-id'),
      joinUserId: document.getElementById('join-userid'),
      statusMsg: document.getElementById('status-msg'),
      chWrap: document.getElementById('channel-list-wrap'),
      adminOverlay: document.getElementById('admin-overlay'),
      btnSettings: document.getElementById('btn-settings'),
      secPatch: document.getElementById('sec-patch'),
      secIo: document.getElementById('sec-io'),
      tabPatch: document.getElementById('tab-patch'),
      tabIo: document.getElementById('tab-io'),
      btnIoToggle: document.getElementById('btn-io-toggle'),
      selectOutput: document.getElementById('select-output-device'),
      selectIoLeft: document.getElementById('select-io-left'),
      selectIoRight: document.getElementById('select-io-right')
    };

    // --- INITIALIZATION ---
    document.getElementById('btn-join-member').onclick = () => joinNetwork(false);
    document.getElementById('btn-join-admin').onclick = () => joinNetwork(true);
    els.btnSettings.onclick = () => { els.adminOverlay.style.display = 'flex'; buildAdminMatrix(); buildIoUI(); };
    document.getElementById('btn-close-admin').onclick = () => els.adminOverlay.style.display = 'none';
    els.tabPatch.onclick = () => { els.secPatch.style.display = 'block'; els.secIo.style.display = 'none'; els.tabPatch.classList.add('active'); els.tabIo.classList.remove('active'); };
    els.tabIo.onclick = () => { els.secPatch.style.display = 'none'; els.secIo.style.display = 'block'; els.tabPatch.classList.remove('active'); els.tabIo.classList.add('active'); };

    // --- NETWORK ---
    async function joinNetwork(isAdmin) {
      if (isAdmin) { if (prompt("Admin Password") !== "tmax") return; }
      state.roomId = els.hostId.value.trim() || 'yytalk';
      state.myUserId = els.joinUserId.value.trim() || 'Unknown';
      state.isAdmin = isAdmin;
      if (isAdmin) els.btnSettings.style.display = 'flex';

      try {
        els.statusMsg.textContent = "パスポート発行中...";
        const res = await fetch(`${WORKER_AUTH_URL}/?room=${state.roomId}&user=${state.myUserId}`);
        const { token } = await res.json();

        state.room = new LivekitClient.Room();
        await state.room.connect(LIVEKIT_WS_URL, token);
        els.loginOverlay.style.display = 'none';

        // MQTT Tally Connection
        const mqttClient = mqtt.connect(MQTT_WS_URL, { username: MQTT_USER, password: MQTT_PASS });
        mqttClient.on('connect', () => mqttClient.subscribe(`yytalk/tally/${state.roomId}`));
        mqttClient.on('message', (topic, msg) => {
          const raw = msg.toString();
          const [id, act] = raw.includes(':') ? raw.split(':') : [1, raw];
          if (act === "ON") document.body.style.backgroundColor = "var(--red)";
          else document.body.style.backgroundColor = "#121418";
        });

        // Audio Setup
        await initAudio();
        
        // Listen events
        state.room.on('trackSubscribed', handleTrackSubscribed);
        state.room.on('dataReceived', (payload, participant) => {
          const data = JSON.parse(new TextDecoder().decode(payload));
          handleNetworkData(data, participant?.identity);
        });

        // Request initial state
        sendData({ type: 'hello' });

        loadState();
        renderChannels();

      } catch (e) { alert(e.message); }
    }

    // --- AUDIO CORE ---
    async function initAudio() {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      state.masterAnalyser = state.audioCtx.createAnalyser();
      state.masterAnalyser.connect(state.audioCtx.destination);
      
      const constraints = state.ioBridge.enabled ? 
        { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } } :
        { audio: { echoCancellation: true, noiseSuppression: true } };

      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      await state.room.localParticipant.setMicrophoneEnabled(true, constraints.audio);
      
      startMeterLoop();
    }

    function setupChannelAudio(chId) {
      if (state.channelNodes[chId]) return;
      const gain = state.audioCtx.createGain();
      const panner = state.audioCtx.createStereoPanner();
      const analyser = state.audioCtx.createAnalyser();
      
      gain.connect(panner);
      panner.connect(analyser);
      analyser.connect(state.masterAnalyser);
      
      state.channelNodes[chId] = { gain, panner, analyser };
    }

    function updateAudioRouting() {
      if (!state.audioCtx) return;
      
      state.channels.forEach(ch => {
        setupChannelAudio(ch.id);
        const node = state.channelNodes[ch.id];
        
        // Listen Logic
        const isListening = state.listenStates[ch.id];
        node.gain.gain.setTargetAtTime(isListening ? 1.5 : 0, state.audioCtx.currentTime, 0.05);

        // I/O Bridge Panning
        if (state.ioBridge.enabled) {
          if (ch.id === state.ioBridge.leftCh) node.panner.pan.setTargetAtTime(-1, state.audioCtx.currentTime, 0.05);
          else if (ch.id === state.ioBridge.rightCh) node.panner.pan.setTargetAtTime(1, state.audioCtx.currentTime, 0.05);
          else node.panner.pan.setTargetAtTime(0, state.audioCtx.currentTime, 0.05);
        } else {
          node.panner.pan.setTargetAtTime(0, state.audioCtx.currentTime, 0.05);
        }
      });

      // Peer Routing
      for (const peerId in state.mediaCalls) {
        const call = state.mediaCalls[peerId];
        const remoteTalk = state.remoteTalkStates[peerId] || {};
        state.channels.forEach(ch => {
          const g = call.chGains[ch.id];
          if (g) g.gain.setTargetAtTime(remoteTalk[ch.id] ? 1 : 0, state.audioCtx.currentTime, 0.05);
        });
      }
    }

    // --- UI RENDERING ---
    function renderChannels() {
      els.chWrap.innerHTML = '';
      const myAssigned = state.userAssignments[state.myUserId] || state.channels.map(c => c.id);
      
      state.channels.forEach(ch => {
        if (!myAssigned.includes(ch.id)) return;
        
        const card = document.createElement('div');
        card.className = `channel-card ${state.listenStates[ch.id] ? 'listen-on' : ''} ${state.talkStates[ch.id] ? 'talk-on' : ''}`;
        
        // Count active speakers for "Local" restriction
        let speakerCount = 0;
        for(let peer in state.remoteTalkStates) if(state.remoteTalkStates[peer][ch.id]) speakerCount++;
        if(state.talkStates[ch.id]) speakerCount++;

        const isLocalLimit = ch.subType === 'Local' && speakerCount >= 2 && !state.talkStates[ch.id];

        card.innerHTML = `
          <div class="main-controls">
            <div class="btn-action btn-listen ${state.listenStates[ch.id] ? 'active' : ''}" onclick="toggleListen('${ch.id}')">
              <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </div>
            <div class="ch-info">
              <div class="ch-name">${ch.name}</div>
              <div class="ch-type-badge">${ch.subType}</div>
            </div>
            <div class="btn-action btn-talk ${state.talkStates[ch.id] ? 'active' : ''} ${ch.subType === 'Listen' ? 'disabled' : ''} ${isLocalLimit ? 'disabled' : ''}" 
                 id="talk-${ch.id}">
              <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </div>
          </div>
          <div class="ch-meter-container">
            <div class="ch-meter-grad"></div>
            <div class="ch-meter-fill" id="meter-${ch.id}"></div>
          </div>
        `;
        els.chWrap.appendChild(card);

        // Talk Button Event (PTT/Latch)
        const tBtn = card.querySelector(`#talk-${ch.id}`);
        if (ch.subType !== 'Listen') {
          tBtn.onpointerdown = () => toggleTalk(ch.id, true);
          tBtn.onpointerup = () => toggleTalk(ch.id, false);
        }
      });
    }

    function toggleListen(chId) {
      state.listenStates[chId] = !state.listenStates[chId];
      updateAudioRouting();
      renderChannels();
      sendData({ type: 'sync-listen', states: state.listenStates });
    }

    function toggleTalk(chId, active) {
      // Local Limit Check
      if (active) {
        const ch = state.channels.find(c => c.id === chId);
        if (ch.subType === 'Local') {
          let count = 0;
          for(let p in state.remoteTalkStates) if(state.remoteTalkStates[p][chId]) count++;
          if (count >= 2) return; // Block if 2 people already talking
        }
      }
      state.talkStates[chId] = active;
      if (state.room?.localParticipant) state.room.localParticipant.setMicrophoneEnabled(Object.values(state.talkStates).some(v => v));
      updateAudioRouting();
      renderChannels();
      sendData({ type: 'sync-talk', states: state.talkStates });
    }

    // --- ADMIN MATRIX & I/O ---
    function buildAdminMatrix() {
      const container = document.getElementById('admin-matrix-container');
      let html = `<table class="admin-matrix"><thead><tr><th>PARTY NAME</th><th>TYPE</th>`;
      state.registeredUsers.forEach(u => html += `<th>${u}</th>`);
      html += `<th>DEL</th></tr></thead><tbody>`;

      state.channels.forEach(ch => {
        html += `<tr>
          <td><input type="text" value="${ch.name}" onchange="updateChName('${ch.id}', this.value)"></td>
          <td>
            <select onchange="updateChSubType('${ch.id}', this.value)">
              <option value="PL" ${ch.subType==='PL'?'selected':''}>PL</option>
              <option value="Local" ${ch.subType==='Local'?'selected':''}>Local</option>
              <option value="Listen" ${ch.subType==='Listen'?'selected':''}>Listen</option>
            </select>
          </td>`;
        state.registeredUsers.forEach(uid => {
          const active = (state.userAssignments[uid] || []).includes(ch.id);
          html += `<td><div class="matrix-toggle ${active?'active':''}" onclick="toggleAssign('${uid}','${ch.id}')"></div></td>`;
        });
        html += `<td><button onclick="removeCh('${ch.id}')">×</button></td></tr>`;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function buildIoUI() {
      els.btnIoToggle.textContent = state.ioBridge.enabled ? "ON" : "OFF";
      els.btnIoToggle.style.backgroundColor = state.ioBridge.enabled ? "var(--green)" : "var(--card-bg)";
      els.btnIoToggle.onclick = () => {
        state.ioBridge.enabled = !state.ioBridge.enabled;
        buildIoUI();
        updateAudioRouting();
        initAudio(); // Re-init for noise cancellation toggle
      };

      // Populate Channel Selects
      [els.selectIoLeft, els.selectIoRight].forEach(sel => {
        sel.innerHTML = '<option value="">NONE</option>';
        state.channels.forEach(ch => {
          const opt = document.createElement('option');
          opt.value = ch.id; opt.textContent = ch.name;
          sel.appendChild(opt);
        });
      });
      els.selectIoLeft.value = state.ioBridge.leftCh;
      els.selectIoRight.value = state.ioBridge.rightCh;

      els.selectIoLeft.onchange = (e) => { state.ioBridge.leftCh = e.target.value; updateAudioRouting(); };
      els.selectIoRight.onchange = (e) => { state.ioBridge.rightCh = e.target.value; updateAudioRouting(); };
      
      // Device List
      navigator.mediaDevices.enumerateDevices().then(devices => {
        els.selectOutput.innerHTML = '';
        devices.filter(d => d.kind === 'audiooutput').forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.deviceId; opt.textContent = d.label || 'Default Speaker';
          els.selectOutput.appendChild(opt);
        });
      });
    }

    // --- UTILS ---
    function sendData(payload) {
      if (!state.room) return;
      const data = new TextEncoder().encode(JSON.stringify(payload));
      state.room.localParticipant.publishData(data, { reliable: true });
    }

    function handleNetworkData(data, senderId) {
      if (data.type === 'hello' && state.isAdmin) {
        sendData({ type: 'init', channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers });
      }
      if (data.type === 'init') {
        state.channels = data.channels;
        state.userAssignments = data.assignments;
        state.registeredUsers = data.registered;
        renderChannels();
      }
      if (data.type === 'sync-talk') {
        state.remoteTalkStates[senderId] = data.states;
        updateAudioRouting();
        renderChannels();
      }
    }

    function handleTrackSubscribed(track, pub, participant) {
      if (track.kind === 'audio') {
        const stream = new MediaStream([track.mediaStreamTrack]);
        const audioEl = new Audio();
        audioEl.srcObject = stream;
        audioEl.muted = true;
        audioEl.play();

        const source = state.audioCtx.createMediaStreamSource(stream);
        const call = { stream, source, chGains: {} };
        
        state.channels.forEach(ch => {
          const g = state.audioCtx.createGain();
          g.gain.value = 0;
          source.connect(g);
          if (state.channelNodes[ch.id]) g.connect(state.channelNodes[ch.id].analyser);
          call.chGains[ch.id] = g;
        });
        state.mediaCalls[participant.identity] = call;
      }
    }

    function startMeterLoop() {
      const data = new Uint8Array(128);
      function draw() {
        requestAnimationFrame(draw);
        if (!state.masterAnalyser) return;
        
        state.channels.forEach(ch => {
          const node = state.channelNodes[ch.id];
          if (node) {
            node.analyser.getByteFrequencyData(data);
            let sum = 0; for(let v of data) sum += v;
            const mask = document.getElementById(`meter-${ch.id}`);
            if (mask) mask.style.width = (100 - Math.min(100, (sum/data.length)*2.5)) + '%';
          }
        });

        state.masterAnalyser.getByteFrequencyData(data);
        let mSum = 0; for(let v of data) mSum += v;
        document.getElementById('master-meter-fill').style.width = (100 - Math.min(100, (mSum/data.length)*2)) + '%';
      }
      draw();
    }

    // Storage
    function saveState() { localStorage.setItem(`yytalk_state_${state.roomId}`, JSON.stringify({ channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers })); }
    function loadState() {
      const saved = localStorage.getItem(`yytalk_state_${state.roomId}`);
      if (saved) {
        const d = JSON.parse(saved);
        state.channels = d.channels; state.userAssignments = d.assignments; state.registeredUsers = d.registered;
      } else {
        state.channels = [
          { id: 'ch1', name: 'CAM PL', subType: 'PL' },
          { id: 'ch2', name: 'CA PL', subType: 'PL' },
          { id: 'ch3', name: 'VE LOCAL', subType: 'Local' },
          { id: 'ch4', name: 'PGM LISTEN', subType: 'Listen' }
        ];
        state.registeredUsers = [state.myUserId];
        state.userAssignments[state.myUserId] = state.channels.map(c => c.id);
      }
    }

    // Matrix Helpers
    window.updateChSubType = (id, val) => { state.channels.find(c => c.id === id).subType = val; saveState(); sendData({ type: 'init', channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers }); renderChannels(); };
    window.toggleAssign = (uid, cid) => {
      let a = state.userAssignments[uid] || [];
      if (a.includes(cid)) a = a.filter(i => i !== cid); else a.push(cid);
      state.userAssignments[uid] = a; saveState(); buildAdminMatrix();
      sendData({ type: 'init', channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers });
    };

    els.btnAddCh.onclick = () => {
      const id = 'ch' + Date.now();
      state.channels.push({ id, name: 'New Party', subType: 'PL' });
      saveState(); buildAdminMatrix(); renderChannels();
      sendData({ type: 'init', channels: state.channels, assignments: state.userAssignments, registered: state.registeredUsers });
    };

  </script>
</body>
</html>
